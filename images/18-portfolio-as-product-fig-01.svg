<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-18-01">
  <title id="fig-title-18-01">Five things "portfolio" means</title>
  <desc>The word does five jobs: resume, portfolio website, GitHub profile, LinkedIn profile, and portfolio-as-product. Each has a distinct audience, reading speed, and optimization goal; the fifth binds the first four into one story.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="18-portfolio-as-product" figure-number="01"
