  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Five things "portfolio" means</text>
  <text x="32" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Conflating these five surfaces is the first mistake. They serve different speeds — but tell one story.</text>

  <!-- headers -->
  <text x="32" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Surface</text>
  <text x="190" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Audience</text>
  <text x="350" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Read speed</text>
  <text x="500" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Optimize for</text>
  <line x1="32" y1="94" x2="668" y2="94" stroke="#121212" stroke-width="1"/>

  <!-- Row 1 resume -->
  <text x="32" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Résumé</text>
  <text x="190" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">ATS, then recruiter</text>
  <text x="350" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">30-second skim</text>
  <text x="500" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">parseability, keywords</text>
  <line x1="32" y1="134" x2="668" y2="134" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Row 2 website -->
  <text x="32" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Portfolio site</text>
  <text x="190" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">hiring manager</text>
  <text x="350" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">2–5 min deep read</text>
  <text x="500" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">craft, selected work</text>
  <line x1="32" y1="174" x2="668" y2="174" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Row 3 github -->
  <text x="32" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">GitHub profile</text>
  <text x="190" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">engineers</text>
  <text x="350" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">inspect, indexed</text>
  <text x="500" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">technical evidence</text>
  <line x1="32" y1="214" x2="668" y2="214" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Row 4 linkedin -->
  <text x="32" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">LinkedIn profile</text>
  <text x="190" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">recruiter search</text>
  <text x="350" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">scan, frequent</text>
  <text x="500" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">discovery, search rank</text>
  <line x1="32" y1="254" x2="668" y2="254" stroke="#121212" stroke-width="1"/>

  <!-- Row 5 portfolio-as-product (synthesis) -->
  <rect x="32" y="262" width="636" height="92" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="44" y="288" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Portfolio-as-product</text>
  <text x="44" y="310" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">The fifth thing: the first four telling the same story from four angles.</text>
  <text x="44" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">Same archetype. Same voice. Same selected projects. Same positioning sentence.</text>
  <text x="44" y="348" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Convergence, not uniformity — a reader of all four should have no doubt it is one person.</text>

  <text x="32" y="392" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Different reading speeds and audiences. One positioning sentence appears in all of them.</text>
</svg>
