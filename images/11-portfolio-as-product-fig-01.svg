<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-11-1 desc-11-1">
<title id="title-11-1">The three compounding channels of a portfolio</title>
<desc id="desc-11-1">Three compounding channels radiate from a central portfolio artifact. Channel 1, Direct hiring, is a short, predictable, visible arrow. Channel 2, Indirect reference, is a long, invisible, delayed, high-compounding arrow. Channel 3, Template effects, is a branching, autonomous arrow that scales with craft. Channels 2 and 3 operate long after Channel 1 is exhausted.</desc>
<defs>
<marker id="arrow-11-1" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
<path d="M0,1 L9,5 L0,9 Z" fill="#C8102E"/>
</marker>
<marker id="arrow-11-1n" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
<path d="M0,1 L9,5 L0,9 Z" fill="#545454"/>
</marker>
</defs>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="40" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2a1a0e">The three compounding channels of a portfolio</text>
<text x="48" y="60" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">Build once. Channels 2 and 3 keep compounding long after Channel 1 is exhausted.</text>

<!-- central portfolio artifact -->
<rect x="92" y="180" width="120" height="64" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
<text x="152" y="208" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#2a1a0e">Portfolio</text>
<text x="152" y="226" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9.5" fill="#545454">built once</text>

<!-- Channel 1: short, visible -->
<line x1="212" y1="200" x2="300" y2="138" stroke="#545454" stroke-width="1.5" marker-end="url(#arrow-11-1n)"/>
<rect x="306" y="112" width="316" height="52" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="318" y="130" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#2a1a0e">Channel 1 — Direct hiring</text>
<text x="318" y="148" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9.5" fill="#545454">Short, predictable, visible. Recruiter finds, screens, advances.</text>

<!-- Channel 2: long, invisible, red emphasis -->
<line x1="212" y1="214" x2="300" y2="216" stroke="#C8102E" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow-11-1)"/>
<rect x="306" y="190" width="316" height="52" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.5"/>
<text x="318" y="208" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#C8102E">Channel 2 — Indirect reference</text>
<text x="318" y="226" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9.5" fill="#545454">Long, invisible, delayed, high-compounding. Worth referencing.</text>

<!-- Channel 3: branching -->
<line x1="212" y1="228" x2="300" y2="294" stroke="#545454" stroke-width="1.5" marker-end="url(#arrow-11-1n)"/>
<!-- branch lines -->
<line x1="300" y1="294" x2="330" y2="278" stroke="#545454" stroke-width="1" marker-end="url(#arrow-11-1n)"/>
<line x1="300" y1="294" x2="330" y2="310" stroke="#545454" stroke-width="1" marker-end="url(#arrow-11-1n)"/>
<rect x="306" y="268" width="316" height="58" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="318" y="286" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#2a1a0e">Channel 3 — Template effects</text>
<text x="318" y="304" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9.5" fill="#545454"><tspan x="318" dy="0">Branching, autonomous, scales with craft. Forks and</tspan><tspan x="318" dy="13">clones carry your name forward.</tspan></text>

<line x1="48" y1="382" x2="652" y2="382" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="400" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 11.1</text>
</svg>
