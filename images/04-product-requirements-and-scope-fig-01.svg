<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-4-1 desc-4-1">
<title id="title-4-1">The Build-Measure-Learn loop</title>
<desc id="desc-4-1">A circular diagram with three labelled nodes — Build, Measure, Learn — annotated with what gets built (the hypothesis-testing MVP), what gets measured (behavior, not stated intent), and what changes (the hypothesis or the build scope). An outer loop shows each cycle updating the PRD, so the PRD is a living document, not a one-time artifact.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>
<text x="48" y="40" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#2a1a0e">The Build-Measure-Learn loop</text>
<text x="48" y="60" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">Each cycle tests one hypothesis and updates the PRD. The MVP boundary keeps the loop tight.</text>

<!-- center reference -->
<!-- three nodes on a circle, cx 270 cy 230 r 110 -->
<!-- Build top -->
<rect x="222" y="100" width="96" height="44" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
<text x="270" y="127" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" fill="#FFFFFF">Build</text>
<!-- Measure bottom-right -->
<rect x="330" y="276" width="96" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="378" y="303" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" fill="#2a1a0e">Measure</text>
<!-- Learn bottom-left -->
<rect x="114" y="276" width="96" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="162" y="303" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" fill="#2a1a0e">Learn</text>

<!-- circular arrows Build->Measure->Learn->Build -->
<path d="M 318 134 A 110 110 0 0 1 388 274" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M 330 300 L 214 300" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M 152 274 A 110 110 0 0 1 222 134" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- node annotations -->
<text x="270" y="166" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">smallest MVP that</text>
<text x="270" y="178" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">tests the hypothesis</text>
<text x="392" y="338" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">behavior, not</text>
<text x="392" y="350" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">stated intent</text>
<text x="148" y="338" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">revise hypothesis</text>
<text x="148" y="350" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">or build scope</text>

<!-- outer loop to PRD -->
<rect x="496" y="196" width="156" height="56" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="574" y="220" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#2a1a0e">PRD updated</text>
<text x="574" y="238" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#545454">a living document</text>
<path d="M 210 298 C 360 392, 520 320, 540 252" stroke="#C8860E" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 540 196 C 520 150, 360 96, 318 116" stroke="#C8860E" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="500" y="300" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#C8860E">each cycle feeds the PRD</text>

<line x1="48" y1="382" x2="652" y2="382" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="400" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 4.1</text>
</svg>
