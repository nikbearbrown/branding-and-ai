<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-00-01">
  <title id="fig-title-00-01">The Copilot productivity collapse</title>
  <desc>Bar chart comparing task completion time: control group 161 minutes versus Copilot group 71 minutes, a 56 percent reduction.</desc>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Task completion time: same HTTP-server task, with and without Copilot</text>

  <!-- plot region -->
  <rect x="80" y="64" width="540" height="300" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- gridlines + y ticks (0 to 180, zero baseline) -->
  <g font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">
    <line x1="80" y1="364" x2="620" y2="364" stroke="#D4D4D4" stroke-width="1"/>
    <line x1="80" y1="314" x2="620" y2="314" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="80" y1="264" x2="620" y2="264" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="80" y1="214" x2="620" y2="214" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="80" y1="164" x2="620" y2="164" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="80" y1="114" x2="620" y2="114" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="72" y="368" text-anchor="end">0</text>
    <text x="72" y="318" text-anchor="end">30</text>
    <text x="72" y="268" text-anchor="end">60</text>
    <text x="72" y="218" text-anchor="end">90</text>
    <text x="72" y="168" text-anchor="end">120</text>
    <text x="72" y="118" text-anchor="end">150</text>
  </g>
  <text x="36" y="220" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 36 220)" text-anchor="middle">Minutes to complete</text>

  <!-- Control bar: 161 min -> height 161/180*300 = 268 -->
  <rect x="180" y="96" width="120" height="268" fill="#787878"/>
  <text x="240" y="88" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212" text-anchor="middle">161 min</text>
  <text x="240" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212" text-anchor="middle">Control group</text>

  <!-- Copilot bar: 71 min -> height 71/180*300 = 118 (RED focal) -->
  <rect x="400" y="246" width="120" height="118" fill="#C8102E"/>
  <text x="460" y="238" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212" text-anchor="middle">71 min</text>
  <text x="460" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212" text-anchor="middle">Copilot group</text>

  <!-- reduction bracket between bar tops -->
  <line x1="300" y1="96" x2="400" y2="96" stroke="#121212" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="350" y1="96" x2="350" y2="246" stroke="#121212" stroke-width="1"/>
  <text x="362" y="175" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">56% reduction</text>

  <text x="80" y="416" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: PENG ET AL. (2023), MICROSOFT RESEARCH — 95 PROFESSIONAL DEVELOPERS</text>
</svg>
