<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">From contract change to product death — sixty days</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">The third-party Reddit ecosystem, April–July 2023.</text>
<line x1="80" y1="220" x2="620" y2="220" stroke="#1a1714" stroke-width="1.5"/>
<path d="M614 216 L622 220 L614 224 Z" fill="#1a1714"/>
<circle cx="110" cy="220" r="4" fill="#1a1714"/>
<line x1="110" y1="216" x2="110" y2="188" stroke="#8a8480" stroke-width="0.75"/>
<text x="110" y="174" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714" text-anchor="middle">Apr 2023</text>
<text x="110" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Reddit announces</text>
<text x="110" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">API pricing</text>
<circle cx="220" cy="220" r="4" fill="#1a1714"/>
<line x1="220" y1="224" x2="220" y2="238" stroke="#8a8480" stroke-width="0.75"/>
<text x="220" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714" text-anchor="middle">May 31</text>
<text x="220" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Selig publishes</text>
<text x="220" y="282" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">the math ($20M/yr)</text>
<circle cx="330" cy="220" r="4" fill="#1a1714"/>
<line x1="330" y1="216" x2="330" y2="188" stroke="#8a8480" stroke-width="0.75"/>
<text x="330" y="174" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714" text-anchor="middle">Jun 8</text>
<text x="330" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Apollo shutdown</text>
<text x="330" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">announced</text>
<circle cx="440" cy="220" r="4" fill="#1a1714"/>
<line x1="440" y1="224" x2="440" y2="238" stroke="#8a8480" stroke-width="0.75"/>
<text x="440" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714" text-anchor="middle">Jun 12</text>
<text x="440" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Subreddit blackout</text>
<text x="440" y="282" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">(thousands dark)</text>
<circle cx="550" cy="220" r="4" fill="#1a1714"/>
<line x1="550" y1="216" x2="550" y2="188" stroke="#8a8480" stroke-width="0.75"/>
<text x="550" y="174" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714" text-anchor="middle">Jun 30</text>
<text x="550" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Apollo closes</text>
<text x="550" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">for good</text>
<circle cx="640" cy="220" r="4" fill="#1a1714"/>
<line x1="640" y1="224" x2="640" y2="238" stroke="#8a8480" stroke-width="0.75"/>
<text x="640" y="254" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714" text-anchor="middle">Jul 2023</text>
<text x="640" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Third-party</text>
<text x="640" y="282" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">ecosystem gone</text>
<text x="350.0" y="356" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">A contract change three months out becomes a product death in thirty days.</text>
<text x="350.0" y="376" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Damage flows downhill in a contract chain — to the smallest, most vulnerable actor in it.</text>
<text x="350.0" y="402" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Apollo had no degraded mode designed for this magnitude of contract change. Neither did the rest of the third-party ecosystem.</text>
</svg>