  <title id="fig-title-14-04">Drift versus intentional variation</title>
  <desc>The outputs can look identical. Intentional variation is an authorized departure within understood parameters; drift is the same departure repeating across many assets over months — a signal that something has shifted. The distinguisher is the decision and the pattern.</desc>
