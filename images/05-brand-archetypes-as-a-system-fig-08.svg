    <text x="44" y="156" font-size="11" fill="#121212">LinkedIn presents</text>
    <text x="44" y="172" font-size="11" fill="#121212">as a Sage — the</text>
    <text x="44" y="188" font-size="11" fill="#121212">trusted source of</text>
    <text x="44" y="204" font-size="11" fill="#121212">professional wisdom.</text>

    <rect x="210" y="92" width="146" height="130" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
    <text x="222" y="114" font-size="12" font-weight="700" fill="#121212">2 · Name the</text>
    <text x="222" y="130" font-size="12" font-weight="700" fill="#121212">shadow</text>
    <text x="222" y="156" font-size="11" fill="#121212">The Sage's shadow</text>
    <text x="222" y="172" font-size="11" fill="#121212">is dogmatism —</text>
    <text x="222" y="188" font-size="11" fill="#121212">authority hardening</text>
    <text x="222" y="204" font-size="11" fill="#121212">into rigidity.</text>

