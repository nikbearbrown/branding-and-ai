    <text x="400" y="114" font-size="12" font-weight="700" fill="#121212">3 · Early</text>
    <text x="400" y="130" font-size="12" font-weight="700" fill="#121212">signals</text>
    <text x="400" y="156" font-size="11" fill="#121212">More prescriptive</text>
    <text x="400" y="172" font-size="11" fill="#121212">content; authority</text>
    <text x="400" y="188" font-size="11" fill="#121212">signaling over</text>
    <text x="400" y="204" font-size="11" fill="#121212">genuine insight.</text>

