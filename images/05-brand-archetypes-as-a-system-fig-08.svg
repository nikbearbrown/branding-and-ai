    <text x="578" y="114" font-size="12" font-weight="700" fill="#121212">4 · Predicted</text>
    <text x="578" y="130" font-size="12" font-weight="700" fill="#121212">failure</text>
    <text x="578" y="156" font-size="11" fill="#121212">Rewarding the</text>
    <text x="578" y="172" font-size="11" fill="#121212">performance of</text>
    <text x="578" y="188" font-size="11" fill="#121212">expertise over its</text>
    <text x="578" y="204" font-size="11" fill="#121212">expression.</text>
