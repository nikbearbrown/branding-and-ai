  <title id="fig-title-05-08">Worked shadow analysis — LinkedIn</title>
  <desc>Four stages applied to LinkedIn: identify archetype (Sage), name shadow (dogmatism), look for early-warning signals, state the predicted failure mode. The prediction is the shape of failure, not a claim that it will happen.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
