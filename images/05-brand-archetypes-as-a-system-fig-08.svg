  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Predicting the failure mode: a worked shadow analysis</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The prediction is not that the shadow will activate — it is the shape failure would take if it did.</text>

  <!-- four boxes -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif">
