<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-08-9 desc-08-9">
<title id="title-08-9">Stripe's brand strategy as a completed one-page document</title>
<desc id="desc-08-9">The Stripe brand strategy rendered as a completed one-page document — each of the eight sections filled in with the strategy inferred from public artifacts: mission, vision, values, UVP, archetype, voice, positioning, and negative space. A callout notes that Stripe never published this document; it was inferred from public artifacts.</desc>
<rect width="700" height="480" fill="#FFFFFF"/>
<text x="48" y="40" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2a1a0e">Stripe's brand strategy as a completed one-page document</text>
<text x="48" y="60" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">The worked model — every section traceable to the Sage archetype.</text>

<!-- Name / tagline -->
<rect x="60" y="76" width="580" height="36" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.5"/>
<text x="72" y="92" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#C8102E">Stripe</text>
<text x="72" y="106" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9.5" fill="#545454">Tagline: payments infrastructure for the internet · .com owned</text>

<g font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<!-- Mission -->
<rect x="60" y="120" width="285" height="42" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="72" y="137" font-size="10.5" font-weight="bold" fill="#2a1a0e">Mission</text>
<text x="72" y="153" font-size="9.5" fill="#545454">Increase the GDP of the internet.</text>
<!-- Vision -->
<rect x="355" y="120" width="285" height="42" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="367" y="137" font-size="10.5" font-weight="bold" fill="#2a1a0e">Vision</text>
<text x="367" y="153" font-size="9.5" fill="#545454">Any business, anywhere, transacts like a F500.</text>
<!-- Values -->
<rect x="60" y="168" width="285" height="52" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="72" y="185" font-size="10.5" font-weight="bold" fill="#2a1a0e">Values</text>
<text x="72" y="201" font-size="9.5" fill="#545454"><tspan x="72" dy="0">Docs as product · developer experience over</tspan><tspan x="72" dy="12">enterprise process · deliberate expansion</tspan></text>
<!-- UVP -->
<rect x="355" y="168" width="285" height="52" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="367" y="185" font-size="10.5" font-weight="bold" fill="#2a1a0e">UVP</text>
<text x="367" y="201" font-size="9.5" fill="#545454"><tspan x="367" dy="0">Cleanest payment API, integrable in seven</tspan><tspan x="367" dy="12">lines, docs that need no sales call.</tspan></text>
<!-- Archetype -->
<rect x="60" y="226" width="285" height="44" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
<text x="72" y="243" font-size="10.5" font-weight="bold" fill="#C8102E">Archetype — Sage</text>
<text x="72" y="259" font-size="9.5" fill="#545454">Truth through understanding. Shadow: dogmatism.</text>
<!-- Voice -->
<rect x="355" y="226" width="285" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="367" y="243" font-size="10.5" font-weight="bold" fill="#2a1a0e">Voice</text>
<text x="367" y="259" font-size="9.5" fill="#545454">Precise, intellectually serious, understated.</text>
<!-- Positioning -->
<rect x="60" y="276" width="285" height="48" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="72" y="293" font-size="10.5" font-weight="bold" fill="#2a1a0e">Positioning</text>
<text x="72" y="309" font-size="9.5" fill="#545454"><tspan x="72" dy="0">Against internal-build and abandonment,</tspan><tspan x="72" dy="12">not against PayPal or Adyen by name.</tspan></text>
<!-- Negative space -->
<rect x="355" y="276" width="285" height="48" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<text x="367" y="293" font-size="10.5" font-weight="bold" fill="#2a1a0e">Negative space</text>
<text x="367" y="309" font-size="9.5" fill="#545454"><tspan x="367" dy="0">No early enterprise sales · no non-technical</tspan><tspan x="367" dy="12">marketing · no proliferation · no bashing</tspan></text>
</g>

<!-- callout -->
<rect x="60" y="334" width="580" height="30" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="350" y="353" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#545454">This document was inferred from public artifacts — Stripe never published it.</text>

<line x1="48" y1="442" x2="652" y2="442" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="460" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 8.9</text>
</svg>
