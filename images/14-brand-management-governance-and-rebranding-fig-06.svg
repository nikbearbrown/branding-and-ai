<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-14-06">
  <title id="fig-title-14-06">Equity migration: the stranding-risk spectrum</title>
  <desc>Equity lives in customers' mental models. A full rebrand abandons all recognition cues at once and strands equity; a full refresh preserves the recognized core so customers update without rebuilding. Hybrids fall between, each preserving some cues and asking the customer to relearn others.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="14-brand-management-governance-and-rebranding" figure-number="06"
      figure-title="Equity migration: stranding risk spectrum"
      figure-slug="equity-migration-stranding-spectrum"
      figure-type="timeline / spectrum" priority="Important"
      author="Nik Bear Brown" date-generated="2026-06-18"
      source-file="pantry/14-brand-management-governance-and-rebranding-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="380" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Equity migration: how much recognition survives the change</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Equity is a property of customers' mental models, not of the brand itself.</text>

  <!-- Sequential ramp bar: high stranding (dark) on left, low (light) on right -->
  <rect x="80" y="92" width="180" height="44" fill="#121212" stroke="#121212" stroke-width="1"/>
  <rect x="260" y="92" width="180" height="44" fill="#787878" stroke="#121212" stroke-width="1"/>
  <rect x="440" y="92" width="180" height="44" fill="#F0EBE3" stroke="#121212" stroke-width="1"/>

  <text x="170" y="119" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Full rebrand</text>
  <text x="350" y="119" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Hybrid</text>
  <text x="530" y="119" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Full refresh</text>

  <!-- stranding risk callout (RED) on the rebrand end -->
  <line x1="170" y1="92" x2="170" y2="64" stroke="#787878" stroke-width="1.5"/>
  <text x="170" y="78" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#787878">high stranding risk</text>
  <text x="530" y="160" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">low stranding risk</text>

  <!-- Annotations: preserved vs relearned -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">
    <text x="80" y="200" font-weight="700">Full rebrand</text>
    <text x="80" y="220" fill="#545454">Preserved: nothing —</text>
    <text x="80" y="236" fill="#545454">name, identity, voice,</text>
    <text x="80" y="252" fill="#545454">positioning all change.</text>
    <text x="80" y="272">Relearn: everything.</text>
    <text x="80" y="288">Anchor: none.</text>

    <text x="270" y="200" font-weight="700">Hybrid</text>
    <text x="270" y="220" fill="#545454">Preserved: some cues —</text>
    <text x="270" y="236" fill="#545454">e.g. color or logo</text>
    <text x="270" y="252" fill="#545454">structure kept.</text>
    <text x="270" y="272">Relearn: the changed</text>
    <text x="270" y="288">layers only.</text>

    <text x="460" y="200" font-weight="700">Full refresh</text>
    <text x="460" y="220" fill="#545454">Preserved: logo structure,</text>
    <text x="460" y="236" fill="#545454">typeface category, voice.</text>
    <text x="460" y="252" fill="#545454">Core stays recognizable.</text>
    <text x="460" y="272">Relearn: little —</text>
    <text x="460" y="288">customers update, not rebuild.</text>
  </g>

  <text x="32" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">The rule: change the expression, preserve the recognized core, bring the audience with you.</text>
  <text x="32" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The hard part is knowing which elements carry the equity and which are incidental.</text>
</svg>
