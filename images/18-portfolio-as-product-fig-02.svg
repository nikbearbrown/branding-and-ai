  <title id="fig-title-18-02">Three compounding channels</title>
  <desc>A central portfolio fans out to three channels: direct hiring (short, visible), indirect reference (long, invisible chain — the high-compounding path), and template effects (branching, autonomous forks carrying your name). Channel 2 is where compounding lives.</desc>
