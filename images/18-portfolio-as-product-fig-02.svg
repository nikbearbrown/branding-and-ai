  <path d="M160 216 C 280 216, 330 218, 430 218" fill="none" stroke="#C8102E" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-18-02r)"/>
  <rect x="440" y="190" width="220" height="58" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
