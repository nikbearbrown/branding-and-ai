  <text x="452" y="228" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">share, bookmark, "I heard about you</text>
  <text x="452" y="241" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">from…" — where the compounding lives.</text>

