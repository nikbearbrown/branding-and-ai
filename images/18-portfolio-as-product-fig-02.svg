  <text x="452" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">recruiter finds it, pulls résumé,</text>
  <text x="452" y="143" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">advances you. Visible, predictable.</text>

