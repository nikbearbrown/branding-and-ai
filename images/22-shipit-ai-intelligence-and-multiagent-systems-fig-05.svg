<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-22-05">
  <title id="fig-title-22-05">Compounding error: probability of an error-free chain</title>
  <desc>A line chart of the probability of error-free output against the number of agent steps from 0 to 40. A 10-percent-per-step error curve collapses to roughly 35 percent at 10 steps, 12 percent at 20 steps, and 1.5 percent at 40 steps. A 5-percent-per-step curve decays more slowly.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="22-shipit-ai-intelligence-and-multiagent-systems"
      figure-number="05" figure-title="Compounding error: probability of an error-free chain" figure-slug="compounding-error-chain"
      figure-type="line chart" priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/22-shipit-ai-intelligence-and-multiagent-systems-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Errors compound geometrically with each agent step</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A 10% per-step error rate gives a 40-step agent a ~1.5% chance of a fully correct result.</text>

  <!-- plot region: x 96..660, y 80..360 -->
  <rect x="96" y="80" width="564" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

