  <circle cx="237" cy="262" r="3.5" fill="#C8102E"/>
  <circle cx="378" cy="326" r="3.5" fill="#C8102E"/>
  <circle cx="660" cy="356" r="3.5" fill="#C8102E"/>
  <text x="245" y="256" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212">35%</text>
