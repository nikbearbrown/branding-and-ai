  <line x1="96" y1="220" x2="660" y2="220" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="96" y1="150" x2="660" y2="150" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="96" y1="80" x2="660" y2="80" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- y axis ticks: 0% at 360, 25 at 290, 50 at 220, 75 at 150, 100 at 80 -->
  <text x="88" y="364" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">0%</text>
  <text x="88" y="294" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">25%</text>
  <text x="88" y="224" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">50%</text>
  <text x="88" y="154" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">75%</text>
  <text x="88" y="84" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">100%</text>

  <!-- x axis: steps 0..40 over 96..660 (14.1 px/step). ticks 0,10,20,30,40 -->
  <line x1="96" y1="360" x2="660" y2="360" stroke="#121212" stroke-width="1"/>
  <line x1="96" y1="80" x2="96" y2="360" stroke="#121212" stroke-width="1"/>
  <text x="96" y="380" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">0</text>
