<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-00-02">
  <title id="fig-title-00-02">The four verbs of career value</title>
  <desc>Four-verb sequence Ideate, Build, Brand, Ship; Build is greyed to mark where AI cheapened the signal.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="320" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The four verbs that now carry career value</text>

  <!-- four boxes -->
  <!-- Ideate -->
  <rect x="40" y="100" width="130" height="84" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="105" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Ideate</text>
  <text x="105" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">Find a problem</text>
  <text x="105" y="170" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">worth solving</text>

  <!-- Build (de-emphasised, grey) -->
  <rect x="210" y="100" width="130" height="84" fill="#F5F5F5" stroke="#ADADAD" stroke-width="1"/>
  <text x="275" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#787878" text-anchor="middle">Build</text>
  <text x="275" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#ADADAD" text-anchor="middle">Make it work</text>
  <text x="275" y="170" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#ADADAD" text-anchor="middle">(necessary)</text>
  <text x="275" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle" font-style="italic">cheapened by AI</text>

  <!-- Brand -->
  <rect x="380" y="100" width="130" height="84" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="445" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Brand</text>
  <text x="445" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">Make it legible</text>
  <text x="445" y="170" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">to its audience</text>

  <!-- Ship -->
  <rect x="550" y="100" width="130" height="84" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="615" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Ship</text>
  <text x="615" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">Public URL,</text>
  <text x="615" y="170" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">real feedback</text>

  <!-- arrows -->
  <line x1="172" y1="142" x2="206" y2="142" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="342" y1="142" x2="376" y2="142" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="512" y1="142" x2="546" y2="142" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text x="32" y="278" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The separating work moved upstream into Ideate and downstream into Brand and Ship.</text>
</svg>
