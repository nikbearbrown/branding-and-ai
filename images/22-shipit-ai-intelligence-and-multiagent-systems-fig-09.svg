<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-22-09">
  <title id="fig-title-22-09">Three anti-hallucination patterns</title>
  <desc>The same agent handling an unavailable data point three ways, weakest to strongest: permission to abstain, structured output with null fields, and confidence labeling. Pattern 2 is the recommended starting point.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="22-shipit-ai-intelligence-and-multiagent-systems"
      figure-number="09" figure-title="Three anti-hallucination patterns" figure-slug="anti-hallucination-patterns"
      figure-type="comparison panels" priority="Supplementary" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/22-shipit-ai-intelligence-and-multiagent-systems-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="380" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Three ways to surface uncertainty — weakest to strongest</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Same agent, same missing data point. None eliminates hallucination — they make it visible.</text>

  <!-- Pattern 1 -->
  <rect x="32" y="74" width="636" height="86" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="44" y="96" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Pattern 1 — Permission to abstain</text>
  <text x="44" y="114" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Explicit permission to produce an incomplete answer. Counterintuitive — most prompts reward completeness.</text>
  <rect x="44" y="124" width="612" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="54" y="142" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212">"I cannot verify this with the information provided."</text>

  <!-- Pattern 2 -->
  <rect x="32" y="170" width="636" height="100" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="44" y="192" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Pattern 2 — Structured output with null fields</text>
  <text x="44" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Incompleteness is explicit and machine-readable. Downstream steps can escalate, re-search, or flag for review.</text>
  <rect x="44" y="220" width="612" height="42" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="54" y="238" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212">{ "market_share": null,</text>
  <text x="54" y="254" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212">  "note": "No verifiable source in search results." }</text>

  <!-- Pattern 3 -->
  <rect x="32" y="280" width="636" height="74" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="44" y="302" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Pattern 3 — Confidence labeling</text>
  <text x="44" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Each claim labeled. More informative than null fields, more work to implement.</text>
  <rect x="44" y="328" width="612" height="20" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="54" y="342" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#121212">"confidence": "verified" | "inferred" | "unverifiable"</text>

  <!-- recommendation note -->
  <text x="32" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">For most projects, Pattern 2 is the right starting point — explicit, machine-readable, low implementation cost.</text>
</svg>
