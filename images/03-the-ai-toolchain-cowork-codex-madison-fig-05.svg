<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03-05">
  <title id="fig-title-03-05">The ReAct loop, Intelligence Agent morning run</title>
  <desc>A think-act-observe cycle traced through a news-scoring run: pull 870 articles, dedupe to 87, score sentiment, write to storage; the observation-to-thought feedback arrow is emphasized.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>
  <rect x="0" y="0" width="720" height="480" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">One ReAct cycle: think, act, observe, repeat</text>

  <!-- four nodes in a diamond -->
  <!-- THOUGHT (top) -->
  <rect x="260" y="70" width="200" height="80" fill="#F5F5F5" stroke="#121212" stroke-width="1.25"/>
  <text x="360" y="98" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">THOUGHT</text>
  <text x="360" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">7 a.m. — pull the daily</text>
  <text x="360" y="136" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">news cycle for Brand X</text>

  <!-- ACTION (right) -->
  <rect x="500" y="200" width="200" height="80" fill="#F5F5F5" stroke="#121212" stroke-width="1.25"/>
  <text x="600" y="228" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">ACTION</text>
  <text x="600" y="250" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">pull RSS, News API,</text>
  <text x="600" y="266" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">dedupe, then score</text>

  <!-- OBSERVATION (bottom) -->
  <rect x="260" y="330" width="200" height="80" fill="#F5F5F5" stroke="#121212" stroke-width="1.25"/>
  <text x="360" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">OBSERVATION</text>
  <text x="360" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">870 → 87 unique →</text>
  <text x="360" y="396" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">87 scored; dashboard fired</text>

  <!-- THOUGHT (left, updated) -->
  <rect x="20" y="200" width="200" height="80" fill="#F5F5F5" stroke="#121212" stroke-width="1.25"/>
  <text x="120" y="228" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">THOUGHT (updated)</text>
  <text x="120" y="250" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">reason in light of the</text>
  <text x="120" y="266" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">result; decide next act</text>

  <!-- clockwise arrows -->
  <path d="M460 120 C 540 140, 600 160, 600 196" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 280 C 520 320, 470 340, 462 350" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <!-- OBSERVATION -> THOUGHT(updated) RED focal feedback -->
  <path d="M260 376 C 160 360, 120 320, 120 282" stroke="#C8102E" stroke-width="2" fill="none" marker-end="url(#arrowred)"/>
  <text x="150" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">feedback: observe → rethink</text>
  <!-- updated thought -> action (loop continues) -->
  <path d="M160 200 C 200 150, 240 130, 258 122" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text x="32" y="452" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The feedback edge — reasoning about what the result means — is what separates a true agent loop from a single prompt.</text>
</svg>
