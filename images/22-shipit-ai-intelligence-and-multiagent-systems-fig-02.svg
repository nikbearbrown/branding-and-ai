<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-22-02">
  <title id="fig-title-22-02">The autonomy / orchestration grid</title>
  <desc>A two-axis quadrant: agent decision autonomy on the x-axis, orchestrator control on the y-axis. Autonomous agents sit high-autonomy/low-orchestrator, orchestrated multi-agent low-autonomy/high-orchestrator, conversational in the middle. Madison is marked in the orchestrated quadrant.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="22-shipit-ai-intelligence-and-multiagent-systems"
      figure-number="02" figure-title="The autonomy / orchestration grid" figure-slug="autonomy-orchestration-grid"
      figure-type="conceptual map" priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/22-shipit-ai-intelligence-and-multiagent-systems-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Where does the AI decide, and where does the orchestrator?</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Madison lives firmly in the orchestrated quadrant — by design.</text>

  <!-- plot region -->
  <rect x="120" y="80" width="500" height="320" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- quadrant divider lines -->
  <line x1="370" y1="80" x2="370" y2="400" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <line x1="120" y1="240" x2="620" y2="240" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>

  <!-- axes -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#121212"/>
    </marker>
  </defs>
  <line x1="120" y1="400" x2="630" y2="400" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="120" y1="400" x2="120" y2="72" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="370" y="430" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Agent decision autonomy  (low &#8594; high)</text>
  <text x="70" y="240" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 70 240)">Orchestrator control  (low &#8594; high)</text>

  <!-- orchestrated multi-agent : low autonomy / high orchestrator => upper-left -->
  <circle cx="225" cy="150" r="6" fill="#C8102E"/>
  <text x="240" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Orchestrated multi-agent</text>
  <text x="240" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Workflow decides who runs when</text>
  <text x="240" y="174" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">CrewAI Flows, LangGraph &#183; Madison</text>

  <!-- conversational multi-agent : middle -->
  <circle cx="370" cy="240" r="5" fill="#121212"/>
  <text x="382" y="237" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Conversational multi-agent</text>
  <text x="382" y="251" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Agents converse until they agree &#183; AutoGen</text>

  <!-- autonomous agents : high autonomy / low orchestrator => lower-right -->
  <circle cx="540" cy="330" r="5" fill="#121212"/>
  <text x="528" y="328" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Autonomous agents</text>
  <text x="528" y="342" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Agents set their own next step</text>
  <text x="528" y="356" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">AutoGPT, BabyAGI</text>

  <!-- outside-grid note -->
  <text x="120" y="462" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Single-call and chained patterns sit outside this grid — neither the agent nor an orchestrator holds genuine flow control.</text>
