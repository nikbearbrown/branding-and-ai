<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-23-01">
  <title id="fig-title-23-01">The four interface layers</title>
  <desc>Four stacked layers — visual surface, interaction model, deployment surface, brand surface — each with what it includes and the common engineering mistake. The Bard failure lived in the brand surface.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="23-shipit-interface-and-deployment"
      figure-number="01" figure-title="The four interface layers"
      figure-slug="four-interface-layers" figure-type="structural schematic"
      priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/23-shipit-interface-and-deployment-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">"Interface" is four layers — not just the UI</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Engineers who think "interface" means "UI" underinvest in the layers that damage brand. All four must cohere.</text>

  <!-- Layer 1 -->
  <rect x="32" y="84" width="636" height="76" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">LAYER 1</text>
  <text x="48" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Visual surface</text>
  <text x="220" y="110" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Buttons, forms, layout, color, type, spacing.</text>
  <text x="220" y="134" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">MISTAKE: treating this as the whole of "interface". It's the easiest layer to fix after the fact.</text>

  <!-- Layer 2 -->
  <rect x="32" y="166" width="636" height="76" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="188" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">LAYER 2</text>
  <text x="48" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Interaction model</text>
  <text x="220" y="192" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Chat? Search? Form? Dashboard? Sets the user's mental model.</text>
  <text x="220" y="216" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">MISTAKE: a model that implies more capability than the system can hold — chat implies general competence.</text>

  <!-- Layer 3 -->
  <rect x="32" y="248" width="636" height="76" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="270" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">LAYER 3</text>
  <text x="48" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Deployment surface</text>
  <text x="220" y="274" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">The URL, login wall, first-load latency — what the user meets before the UI.</text>
  <text x="220" y="298" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">MISTAKE: ignoring the "is this real?" question, which Layer 3 answers before Layer 1 is even seen.</text>

  <!-- Layer 4 — annotated as where Bard failed (text, not red) -->
  <rect x="32" y="330" width="636" height="76" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="48" y="352" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">LAYER 4</text>
  <text x="48" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Brand surface</text>
  <text x="220" y="356" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Error messages, empty states, confidence signals, tone.</text>
  <text x="220" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">MISTAKE: where the Bard failure lived — confident bullets, no source, no hedging. The UI was excellent.</text>

  <text x="32" y="430" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH. 23, WHAT "INTERFACE" ACTUALLY MEANS</text>
</svg>
