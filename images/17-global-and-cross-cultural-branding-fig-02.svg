<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-17-02">
  <title id="fig-title-17-02">The keep-global / localize split, element by element</title>
  <desc>Glocalization is decided per element. Eight brand elements — name, visual identity, tagline, product formulation, channel mix, pricing, imagery, humor — each marked as typically global or typically local, with the deciding question.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="17-global-and-cross-cultural-branding" figure-number="02"
