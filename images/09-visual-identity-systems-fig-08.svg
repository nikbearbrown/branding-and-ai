<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-09-08">
  <title id="fig-title-09-08">Type specification scale</title>
  <desc>A six-rung type scale for a Sage system: Display H1, H2, H3, Body, Caption, and UI, each labeled with face, weight, size, and line height. Proportional neutral bars show the hierarchy. Specification prevents drift across pages.</desc>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">A specified type scale prevents drift — each context is a rule, not a new decision</text>

  <!-- ladder: proportional bars on left, spec labels on right -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif">
    <!-- Display/H1 56 -->
    <rect x="40" y="70" width="280" height="40" fill="#545454"/>
    <text x="48" y="96" font-size="13" fill="#FFFFFF" font-weight="700">Display / H1</text>
    <text x="340" y="88" font-size="11" fill="#121212">Source Serif 4 · 700</text>
    <text x="340" y="104" font-size="11" fill="#545454">56px / 1.1 · −0.02em tracking</text>

    <!-- H2 36 -->
    <rect x="40" y="124" width="220" height="32" fill="#787878"/>
    <text x="48" y="145" font-size="12" fill="#FFFFFF" font-weight="700">H2</text>
    <text x="340" y="138" font-size="11" fill="#121212">Source Serif 4 · 600</text>
    <text x="340" y="154" font-size="11" fill="#545454">36px / 1.2</text>

    <!-- H3 24 -->
    <rect x="40" y="170" width="170" height="26" fill="#787878"/>
    <text x="48" y="188" font-size="12" fill="#FFFFFF" font-weight="700">H3</text>
    <text x="340" y="182" font-size="11" fill="#121212">Inter · 600</text>
    <text x="340" y="198" font-size="11" fill="#545454">24px / 1.3</text>

    <!-- Body 16 -->
    <rect x="40" y="210" width="130" height="22" fill="#ADADAD"/>
    <text x="48" y="226" font-size="11" fill="#121212" font-weight="700">Body</text>
    <text x="340" y="220" font-size="11" fill="#121212">Inter · 400</text>
    <text x="340" y="236" font-size="11" fill="#545454">16px / 1.6</text>

    <!-- Caption 13 -->
    <rect x="40" y="246" width="100" height="18" fill="#ADADAD"/>
    <text x="48" y="259" font-size="11" fill="#121212" font-weight="700">Caption</text>
    <text x="340" y="254" font-size="11" fill="#121212">Inter · 400</text>
    <text x="340" y="270" font-size="11" fill="#545454">13px / 1.4</text>

    <!-- UI 14 -->
    <rect x="40" y="278" width="110" height="18" fill="#ADADAD"/>
    <text x="48" y="291" font-size="11" fill="#121212" font-weight="700">UI</text>
    <text x="340" y="286" font-size="11" fill="#121212">Inter · 500</text>
    <text x="340" y="302" font-size="11" fill="#545454">14px / 1 · 0.02em tracking</text>
  </g>

  <line x1="40" y1="320" x2="660" y2="320" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="32" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">Bar length is proportional to type size, showing the visual hierarchy at a glance.</text>
  <text x="32" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Without specification every new page is a new typographic decision, and accumulated inconsistency destroys system coherence.</text>
</svg>
