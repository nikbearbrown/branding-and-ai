<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03-08">
  <title id="fig-title-03-08">Human-in-the-loop: place the gate where errors are expensive</title>
  <desc>A pipeline auto-executes routine steps but routes consequential decisions through a human gate before execution; gate where a wrong answer is expensive and hard to reverse.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
  </defs>
  <rect x="0" y="0" width="720" height="340" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Risk-engineering: automate the cheap, gate the expensive</text>

  <!-- pipeline -->
  <rect x="40" y="120" width="140" height="60" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="110" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Gather + score</text>
  <text x="110" y="166" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">auto</text>

  <rect x="220" y="120" width="140" height="60" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="290" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Draft + analyze</text>
  <text x="290" y="166" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">auto</text>

  <!-- human gate (RED focal) -->
  <rect x="400" y="110" width="120" height="80" fill="#C8102E"/>
  <text x="460" y="142" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">HUMAN GATE</text>
  <text x="460" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">review before</text>
  <text x="460" y="178" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">execution</text>

  <rect x="560" y="120" width="130" height="60" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="625" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Execute</text>
  <text x="625" y="166" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">publish / allocate</text>

  <line x1="180" y1="150" x2="218" y2="150" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="360" y1="150" x2="398" y2="150" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="520" y1="150" x2="558" y2="150" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- consequential decisions note -->
  <text x="460" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">publish content · allocate budget · deploy a persona</text>

  <text x="40" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">Find the decisions where a wrong answer is expensive and hard to correct. Put humans there. Automate everything else.</text>
</svg>
