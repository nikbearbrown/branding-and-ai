  <text x="224" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Do work — configure, run, inspect</text>
  <rect x="440" y="114" width="228" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="452" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">Try the model — input, output, repeat</text>
