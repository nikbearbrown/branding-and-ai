  <text x="350" y="381" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">An orchestrated multi-agent system behind a free-form Gradio box. If the architecture is structured, choose Streamlit.</text>

