<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02-04">
  <title id="fig-title-02-04">Identity vs. image vs. equity: where equity leaks</title>
  <desc>Brand identity projected by the sender crosses a gap to brand image perceived by the receiver; a small gap with favorable image yields equity, and the gap is where equity leaks.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
  </defs>
  <rect x="0" y="0" width="720" height="380" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Brand work is managing the distance between what you project and what lands</text>

  <!-- Identity (sender) -->
  <rect x="40" y="90" width="200" height="90" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="140" y="124" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Identity</text>
  <text x="140" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">what you project</text>
  <text x="140" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">(sender side)</text>

  <!-- GAP (RED focal) -->
  <rect x="300" y="100" width="120" height="70" fill="#C8102E"/>
  <text x="360" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">THE GAP</text>
  <text x="360" y="152" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">equity leaks here</text>

  <!-- Image (receiver) -->
  <rect x="480" y="90" width="200" height="90" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="580" y="124" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Image</text>
  <text x="580" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">what lands</text>
  <text x="580" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">(receiver side)</text>

  <!-- arrows across gap -->
  <line x1="240" y1="135" x2="298" y2="135" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="422" y1="135" x2="478" y2="135" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- equity node -->
  <rect x="260" y="250" width="200" height="80" fill="#F5F5F5" stroke="#121212" stroke-width="1.25"/>
  <text x="360" y="284" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Equity (value)</text>
  <text x="360" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">small gap + favorable image</text>

  <line x1="140" y1="180" x2="300" y2="250" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="580" y1="180" x2="420" y2="250" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
