  <text x="40"  y="244" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">labor</text>
  <text x="186" y="237" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">"fair-wage supply chain"</text>
  <text x="360" y="230" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">supplier code with</text>
