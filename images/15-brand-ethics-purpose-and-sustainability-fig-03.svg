  <title id="fig-title-15-03">Claim categories and their evidence standards</title>
  <desc>A matrix of six claim categories across three families — environmental (carbon, materials), social (labor, diversity), and AI ethics (bias, safety) — with an example claim, the required evidence type, who can certify it, and what cannot substantiate typically means for each.</desc>
