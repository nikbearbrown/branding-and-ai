  <text x="556" y="341" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">third-party assessor</text>

  <!-- ai safety -->
  <rect x="32" y="364" width="636" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">AI ethics —</text>
  <text x="40"  y="400" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">safety</text>
  <text x="186" y="393" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">"human-in-the-loop"</text>
  <text x="360" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">architecture doc: where</text>
  <text x="360" y="400" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">the human sits, what authority</text>
  <text x="556" y="393" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">design + red-team</text>

  <text x="32" y="434" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">"Cannot substantiate" usually means: the claim is a feeling or an aspiration with no measurement, document, or audit behind it.</text>
