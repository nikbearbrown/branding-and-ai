  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">What counts as evidence depends on the claim's category</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Environmental claims need measurement; social claims need documentation; AI-ethics claims need published audits.</text>

