  <rect x="32" y="260" width="636" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Social —</text>
  <text x="40"  y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">diversity</text>
