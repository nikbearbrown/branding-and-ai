<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-06-07">
  <title id="fig-title-06-07">The circular coherence check</title>
  <desc>Seven brand components arranged in a ring, each adjacent pair joined by a consistency question. A contradiction on any edge means the document defers the conflict to a worse moment.</desc>
