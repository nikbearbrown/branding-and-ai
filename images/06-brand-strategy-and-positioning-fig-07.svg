  <text x="350" y="312" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">coherence</text>

  <!-- nodes at angles starting top, every 360/7 ~ 51.4 deg -->
  <!-- positions computed: -->
  <!-- 0: top (350,140) Mission -->
  <!-- 1: (487,193) Vision  -->
  <!-- 2: (506,338) Values  approx -->
  <!-- using approximate hand-placed coords on r=160 circle -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11">
