  <rect x="0" y="0" width="700" height="520" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Check every adjacent pair before you finalize</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">If any pair contradicts, revise until it does not — or the conflict surfaces under pressure later.</text>

