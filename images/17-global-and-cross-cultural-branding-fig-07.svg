  <text x="32" y="400" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Cultural judgment — authentic or tone-deaf, real risk or theoretical — lives in communities, not in the model. That is the +1.</text>
