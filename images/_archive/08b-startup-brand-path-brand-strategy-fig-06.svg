<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-08-6 desc-08-6">
<title id="title-08-6">Anatomy of Stripe's mission statement</title>
<desc id="desc-08-6">An anatomy diagram of Stripe's mission "Increase the GDP of the internet," broken into three labeled callouts: testable, theory-driven, and technology-agnostic. Below it, a generic counter-example mission "Make payments easy" fails the same three tests. The student can apply the same annotation to a draft mission.</desc>
<defs>
<marker id="arrow-08-6" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
<path d="M0,1 L8,4.5 L0,8 Z" fill="#C8102E"/>
</marker>
</defs>
<rect width="700" height="480" fill="#FFFFFF"/>
<text x="48" y="40" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2a1a0e">Anatomy of Stripe's mission statement</text>
<text x="48" y="60" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">A strong mission passes three tests; a generic one fails all three.</text>

<!-- The strong mission -->
<rect x="160" y="84" width="380" height="44" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.5"/>
<text x="350" y="105" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#C8102E">"Increase the GDP of the internet"</text>
<text x="350" y="121" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454">Stripe — the worked model</text>

<!-- three callouts -->
<g font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<line x1="240" y1="128" x2="160" y2="156" stroke="#C8102E" stroke-width="1.25" marker-end="url(#arrow-08-6)"/>
<rect x="60" y="160" width="180" height="84" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="72" y="180" font-size="11" font-weight="bold" fill="#2a1a0e">1 — Testable</text>
<text x="72" y="198" font-size="9.5" fill="#545454"><tspan x="72" dy="0">GDP of the internet is</tspan><tspan x="72" dy="13">in principle measurable.</tspan><tspan x="72" dy="13">Progress can be checked</tspan><tspan x="72" dy="13">against a product decision.</tspan></text>

<line x1="350" y1="128" x2="350" y2="156" stroke="#C8102E" stroke-width="1.25" marker-end="url(#arrow-08-6)"/>
<rect x="260" y="160" width="180" height="84" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="272" y="180" font-size="11" font-weight="bold" fill="#2a1a0e">2 — Theory-driven</text>
<text x="272" y="198" font-size="9.5" fill="#545454"><tspan x="272" dy="0">Implies a causal claim:</tspan><tspan x="272" dy="13">friction in financial</tspan><tspan x="272" dy="13">infrastructure constrains</tspan><tspan x="272" dy="13">digital economic value.</tspan></text>

<line x1="460" y1="128" x2="540" y2="156" stroke="#C8102E" stroke-width="1.25" marker-end="url(#arrow-08-6)"/>
<rect x="460" y="160" width="180" height="84" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="472" y="180" font-size="11" font-weight="bold" fill="#2a1a0e">3 — Tech-agnostic</text>
<text x="472" y="198" font-size="9.5" fill="#545454"><tspan x="472" dy="0">No mention of APIs or</tspan><tspan x="472" dy="13">payments. The mechanism</tspan><tspan x="472" dy="13">could change; the mission</tspan><tspan x="472" dy="13">survives.</tspan></text>
</g>

<!-- Counter-example -->
<line x1="48" y1="276" x2="652" y2="276" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="296" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#2a1a0e">Counter-example — generic mission fails the same three tests</text>
<rect x="160" y="308" width="380" height="40" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="350" y="333" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#545454">"Make payments easy"</text>

<g font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454">
<rect x="60" y="364" width="180" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="150" y="384" text-anchor="middle" font-weight="bold" fill="#2a1a0e">Not testable</text>
<text x="150" y="400" text-anchor="middle">"easy" has no metric</text>
<rect x="260" y="364" width="180" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="350" y="384" text-anchor="middle" font-weight="bold" fill="#2a1a0e">No theory</text>
<text x="350" y="400" text-anchor="middle">no causal claim implied</text>
<rect x="460" y="364" width="180" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<text x="550" y="384" text-anchor="middle" font-weight="bold" fill="#2a1a0e">Tech-bound</text>
<text x="550" y="400" text-anchor="middle">names the category</text>
</g>

<line x1="48" y1="442" x2="652" y2="442" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="460" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 8.6</text>
</svg>
