<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-3-11 desc-3-11">
<title id="title-3-11">Literal reading vs. brand-strategy reading of three archetype names</title>
<desc id="desc-3-11">Three panels contrasting the misleading literal reading of an archetype name with its correct brand-strategy reading. Hero: not a noble warrior but the customer is the hero and the brand is the equipment. Outlaw: not a criminal but a challenger to an establishment. Caregiver: not a nurse but a brand organized around protecting others. The names describe the brand's relationship to its customer, not its personality.</desc>
<rect width="700" height="360" fill="#FFFFFF"/>
<text x="48" y="44" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#2a1a0e">Read the name as a relationship to the customer, not a personality</text>
<text x="48" y="64" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">The literal reading (struck out) misleads; the brand-strategy reading is what the archetype commits to.</text>

<!-- three panels -->
<g font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<!-- Panel 1: Hero -->
<rect x="48" y="92" width="184" height="216" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<rect x="48" y="92" width="184" height="30" fill="#C8102E"/>
<text x="140" y="112" text-anchor="middle" font-size="14" fill="#FFFFFF">Hero</text>
<text x="62" y="148" font-size="11" fill="#545454">Literal:</text>
<text x="62" y="166" font-size="12" fill="#2a1a0e">noble warrior</text>
<line x1="60" y1="162" x2="160" y2="162" stroke="#C8102E" stroke-width="1.5"/>
<text x="62" y="208" font-size="11" fill="#2a1a0e" font-weight="bold">Brand strategy:</text>
<text x="62" y="228" font-size="11" fill="#2a1a0e">the customer is</text>
<text x="62" y="244" font-size="11" fill="#2a1a0e">the hero; the brand</text>
<text x="62" y="260" font-size="11" fill="#2a1a0e">is the equipment.</text>
<text x="62" y="290" font-size="10" fill="#545454">Nike: you push past</text>
<text x="62" y="304" font-size="10" fill="#545454">your own limit.</text>

<!-- Panel 2: Outlaw -->
<rect x="258" y="92" width="184" height="216" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<rect x="258" y="92" width="184" height="30" fill="#C8102E"/>
<text x="350" y="112" text-anchor="middle" font-size="14" fill="#FFFFFF">Outlaw</text>
<text x="272" y="148" font-size="11" fill="#545454">Literal:</text>
<text x="272" y="166" font-size="12" fill="#2a1a0e">criminal</text>
<line x1="270" y1="162" x2="340" y2="162" stroke="#C8102E" stroke-width="1.5"/>
<text x="272" y="208" font-size="11" fill="#2a1a0e" font-weight="bold">Brand strategy:</text>
<text x="272" y="228" font-size="11" fill="#2a1a0e">a challenger to an</text>
<text x="272" y="244" font-size="11" fill="#2a1a0e">establishment worth</text>
<text x="272" y="260" font-size="11" fill="#2a1a0e">disrupting.</text>
<text x="272" y="290" font-size="10" fill="#545454">Harley: step outside</text>
<text x="272" y="304" font-size="10" fill="#545454">the system.</text>

<!-- Panel 3: Caregiver -->
<rect x="468" y="92" width="184" height="216" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
<rect x="468" y="92" width="184" height="30" fill="#C8102E"/>
<text x="560" y="112" text-anchor="middle" font-size="14" fill="#FFFFFF">Caregiver</text>
<text x="482" y="148" font-size="11" fill="#545454">Literal:</text>
<text x="482" y="166" font-size="12" fill="#2a1a0e">a nurse</text>
<line x1="480" y1="162" x2="546" y2="162" stroke="#C8102E" stroke-width="1.5"/>
<text x="482" y="208" font-size="11" fill="#2a1a0e" font-weight="bold">Brand strategy:</text>
<text x="482" y="228" font-size="11" fill="#2a1a0e">organized around</text>
<text x="482" y="244" font-size="11" fill="#2a1a0e">protecting and</text>
<text x="482" y="260" font-size="11" fill="#2a1a0e">serving others.</text>
<text x="482" y="290" font-size="10" fill="#545454">J&amp;J: protect those</text>
<text x="482" y="304" font-size="10" fill="#545454">who cannot.</text>
</g>

<line x1="48" y1="328" x2="652" y2="328" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="346" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 3.11</text>
</svg>
