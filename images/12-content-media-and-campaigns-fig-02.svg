  </metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The PESO model: four kinds of media</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The power is in integration, not in any single quadrant.</text>

  <defs>
    <marker id="arrow-12-02" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#121212"/>
    </marker>
  </defs>

  <!-- Quadrant boxes -->
  <!-- Owned top-left -->
  <rect x="64" y="92" width="250" height="120" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="80" y="118" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Owned</text>
  <text x="80" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">surfaces you control fully</text>
  <text x="80" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">site, blog, email, docs</text>
  <text x="80" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">durable · slow to build</text>

  <!-- Earned top-right -->
  <rect x="386" y="92" width="250" height="120" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="402" y="118" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Earned</text>
  <text x="402" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">coverage others give you</text>
  <text x="402" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">press, reviews, citations</text>
  <text x="402" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">credible · uncontrolled</text>

  <!-- Paid bottom-left -->
  <rect x="64" y="288" width="250" height="120" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="80" y="314" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Paid</text>
  <text x="80" y="336" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">advertising you buy</text>
  <text x="80" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">search, social, display ads</text>
  <text x="80" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">controlled · transactional</text>

  <!-- Shared bottom-right -->
  <rect x="386" y="288" width="250" height="120" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="402" y="314" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Shared</text>
  <text x="402" y="336" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">social and community spread</text>
  <text x="402" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">LinkedIn, X, Reddit, Slack</text>
  <text x="402" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">scalable · audience-controlled</text>

  <!-- Integration arrows between all four (cross pattern via center) -->
