<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-12-02">
  <title id="fig-title-12-02">The PESO media model</title>
  <desc>Four kinds of media — paid, earned, shared, owned — each a different economics, linked by arrows showing each feeds the others. The power is in integration, not in any single quadrant.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="12-content-media-and-campaigns" figure-number="02"
