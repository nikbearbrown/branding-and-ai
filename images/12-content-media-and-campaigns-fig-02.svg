  <line x1="314" y1="356" x2="384" y2="356" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-12-02)"/>
  <line x1="386" y1="340" x2="316" y2="340" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-12-02)"/>

  <text x="350" y="445" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A campaign that uses only one channel leaves three of the four on the table.</text>
