  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The shadow is the strength under pressure — not an accident</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">When you pick an archetype, you also pick your most likely failure mode.</text>

