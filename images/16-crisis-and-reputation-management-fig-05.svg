<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-16-05">
  <title id="fig-title-16-05">Speed vs. wrong-speed: the holding statement resolves the tension</title>
  <desc>Three response postures plotted against speed and accuracy: silence cedes the narrative, wrong-fast issues an unsustainable statement before the facts, and the holding statement is fast while committing to nothing unsustainable. The holding statement sits at the intersection of fast and accurate.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="16-crisis-and-reputation-management" figure-number="05"
      figure-title="Speed vs. wrong-speed: the holding statement"
      figure-slug="speed-vs-wrong-speed-holding-statement"
      figure-type="comparison / decision diagram" priority="Important"
      author="Nik Bear Brown &amp; Nina Harris" date-generated="2026-06-18"
      source-file="pantry/16-crisis-and-reputation-management-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Respond fast — with the right message, not just fast</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The holding statement resolves the speed-versus-accuracy tension.</text>

  <!-- 2-axis plot region -->
  <rect x="120" y="80" width="420" height="240" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- axes -->
  <line x1="120" y1="320" x2="540" y2="320" stroke="#121212" stroke-width="1"/>
  <line x1="120" y1="80"  x2="120" y2="320" stroke="#121212" stroke-width="1"/>
  <text x="330" y="342" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">speed →</text>
  <text x="104" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 104 200)">accuracy / sustainability →</text>

  <!-- quadrant gridlines -->
  <line x1="330" y1="80" x2="330" y2="320" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <line x1="120" y1="200" x2="540" y2="200" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>

  <!-- Silence: slow (left), low-accuracy effect (high accuracy of what's said but cedes narrative) -> place low-speed, label cedes narrative; put bottom-left -->
  <circle cx="180" cy="270" r="6" fill="#787878"/>
  <text x="194" y="266" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Silence</text>
  <text x="194" y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">cedes the narrative —</text>
  <text x="194" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">observers fill the vacuum</text>

  <!-- Wrong-fast: fast (right), low accuracy (bottom-right) -->
  <circle cx="470" cy="270" r="6" fill="#787878"/>
  <text x="456" y="266" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Wrong-fast</text>
  <text x="456" y="282" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">a statement before the facts;</text>
  <text x="456" y="296" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">falsified when they emerge</text>

  <!-- Holding statement: fast AND accurate (top-right), the resolution — ink filled, larger -->
  <circle cx="470" cy="130" r="8" fill="#121212"/>
  <text x="456" y="126" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Holding statement</text>
  <text x="456" y="142" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">fast, and commits to nothing</text>
  <text x="456" y="156" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">it cannot sustain</text>

  <!-- example text under plot -->
  <text x="120" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">"We are investigating urgently. Customer safety is our priority. We will update as soon as we know more."</text>

  <!-- posting thresholds box on the right -->
  <rect x="556" y="80" width="112" height="240" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="566" y="100" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Post by</text>
  <text x="566" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">social media:</text>
  <text x="566" y="142" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">&lt; 2 hours</text>
  <text x="566" y="170" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">trade press:</text>
  <text x="566" y="184" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">~ 1 day</text>
  <text x="566" y="212" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">broadcast:</text>
  <text x="566" y="226" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">pre-queued</text>
  <text x="566" y="262" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">set by severity,</text>
  <text x="566" y="276" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">so the live</text>
  <text x="566" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">decision is</text>
  <text x="566" y="304" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">mechanical</text>

  <text x="32" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A late-and-wrong response can be worse than silence — as in the United case, where the wrong strategy followed the lost first day.</text>
</svg>
