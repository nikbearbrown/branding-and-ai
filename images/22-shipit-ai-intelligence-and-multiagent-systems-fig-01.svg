  <text x="40" y="134" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">1. Single</text>
  <text x="40" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">LLM call</text>
  <text x="160" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Your code — one</text>
  <text x="160" y="151" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">prompt in, one out</text>
  <text x="310" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">OpenAI / Claude</text>
  <text x="310" y="151" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">API node</text>
  <text x="445" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Task fits one</text>
  <text x="445" y="151" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">prompt; output</text>
  <text x="445" y="164" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">validatable</text>
  <text x="555" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Too constrained</text>
  <text x="555" y="151" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">for real judgment</text>

  <!-- row 2 -->
  <rect x="32" y="184" width="120" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="152" y="184" width="150" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="184" width="135" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="437" y="184" width="110" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="547" y="184" width="121" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="206" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">2. Chained</text>
  <text x="40" y="220" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">calls</text>
  <text x="160" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Workflow graph</text>
  <text x="160" y="223" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">fixes the order</text>
  <text x="310" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">n8n sequences,</text>
  <text x="310" y="223" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">LangChain</text>
  <text x="445" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Natural</text>
  <text x="445" y="223" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">sequential</text>
  <text x="445" y="236" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">sub-tasks</text>
  <text x="555" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Errors at step 2</text>
  <text x="555" y="223" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">propagate down</text>

  <!-- row 3 -->
  <rect x="32" y="256" width="120" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="152" y="256" width="150" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="256" width="135" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="437" y="256" width="110" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="547" y="256" width="121" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="278" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">3. Tool-using</text>
  <text x="40" y="292" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">agent (ReAct)</text>
  <text x="160" y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">The LLM — it</text>
  <text x="160" y="295" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">loops on its own</text>
  <text x="310" y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Claude tools,</text>
  <text x="310" y="295" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">ChatGPT plugins</text>
  <text x="445" y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Adaptive</text>
  <text x="445" y="295" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">reasoning; steps</text>
  <text x="445" y="308" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">not enumerable</text>
  <text x="555" y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Hard to predict,</text>
  <text x="555" y="295" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">debug, cost-bound</text>

  <!-- row 4 -->
  <rect x="32" y="328" width="120" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="152" y="328" width="150" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="328" width="135" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="437" y="328" width="110" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="547" y="328" width="121" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">4. Multi-agent</text>
  <text x="40" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">system</text>
  <text x="160" y="354" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">An orchestrator</text>
  <text x="160" y="367" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">routes specialists</text>
  <text x="310" y="354" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">CrewAI, LangGraph,</text>
  <text x="310" y="367" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">AutoGen</text>
  <text x="445" y="354" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Distinct</text>
  <text x="445" y="367" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">specialisms, each</text>
  <text x="445" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">debuggable</text>
  <text x="555" y="354" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Upfront design</text>
  <text x="555" y="367" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">cost; rigidity</text>
</svg>
