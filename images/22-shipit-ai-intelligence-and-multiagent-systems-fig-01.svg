  <title id="fig-title-22-01">The four patterns of AI intelligence</title>
  <desc>Reference matrix of four AI-involvement patterns — single LLM call, chained calls, tool-using agent, multi-agent system — compared by who controls the next step, representative tools, best use, and primary failure mode.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
