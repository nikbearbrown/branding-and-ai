  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Four patterns of AI intelligence — not one thing</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Each pattern is a different point on the autonomy dial, with a different risk profile.</text>

