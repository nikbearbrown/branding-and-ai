  <rect x="32" y="112" width="120" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="152" y="112" width="150" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="112" width="135" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
