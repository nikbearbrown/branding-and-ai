  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Hofstede's dimensions as a brand-message lens</text>
  <text x="32" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A tool for asking better questions about a market — never a script for individuals in it.</text>

