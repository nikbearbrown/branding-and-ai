  <text x="32" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Power distance</text>
  <text x="200" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">defers to authority</text>
  <text x="386" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">skeptical of it</text>
  <text x="540" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">expert endorsement</text>
  <line x1="32" y1="134" x2="668" y2="134" stroke="#D4D4D4" stroke-width="0.75"/>

