  <text x="44" y="430" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Caveat: population tendency, not individual script.</text>
  <text x="44" y="446" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Scores describe a national culture's statistical center, not any one person. Use it to ask, not to answer.</text>
