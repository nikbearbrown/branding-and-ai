  <text x="540" y="171" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">relevant dimension</text>
  <line x1="32" y1="178" x2="668" y2="178" stroke="#D4D4D4" stroke-width="0.75"/>

