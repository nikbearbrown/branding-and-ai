  <title id="fig-title-17-03">Hofstede's dimensions as a brand-message lens</title>
  <desc>Six cultural dimensions used to ask better questions, not to script individuals. Each row shows the high-score tendency, low-score tendency, and brand-message implication, with a standing caveat: population tendency, not individual script.</desc>
