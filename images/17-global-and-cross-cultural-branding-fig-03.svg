  <text x="386" y="212" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">novelty, disruption</text>
  <text x="540" y="212" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">risk vs. reassurance</text>
  <line x1="32" y1="232" x2="668" y2="232" stroke="#D4D4D4" stroke-width="0.75"/>

