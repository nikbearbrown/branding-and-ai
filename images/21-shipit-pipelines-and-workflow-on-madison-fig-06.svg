  <text x="350" y="403" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">The visual graph forces the contracts to be explicit — reason about them before they fail, isolate them when they do.</text>

