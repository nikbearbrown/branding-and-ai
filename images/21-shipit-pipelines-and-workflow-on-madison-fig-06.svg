  <text x="392" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Each contract is its own labeled,</text>
  <text x="392" y="308" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">independently replaceable node.</text>
  <text x="392" y="324" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Swap OpenAI for Claude in place.</text>

  <!-- Footer -->
