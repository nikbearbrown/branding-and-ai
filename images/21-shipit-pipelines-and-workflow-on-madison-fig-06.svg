  <text x="378" y="102" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">An n8n workflow</text>
  <rect x="362" y="114" width="306" height="262" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>

