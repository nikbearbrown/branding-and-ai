<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-21-06">
  <title id="fig-title-21-06">Python script vs. n8n workflow — same pipeline, two representations</title>
  <desc>A monolithic Python script with interwoven dependency calls beside an n8n workflow where every contract is a separately labeled, independently replaceable node. One makes the contracts visible.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
