  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Same pipeline, two representations — one makes the contracts visible</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">In n8n every dependency is a node with a defined input and output — replaceable without touching the rest.</text>

  <!-- LEFT: Python script -->
  <rect x="32" y="80" width="306" height="34" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="102" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">A single Python script</text>
  <rect x="32" y="114" width="306" height="262" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <!-- tangled block -->
  <rect x="56" y="138" width="258" height="208" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <text x="72" y="160" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">def run():</text>
  <text x="84" y="178" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">r = requests.get(RSS)</text>
  <text x="84" y="196" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">o = openai.score(r)</text>
  <text x="84" y="214" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">reddit.fetch(o)</text>
  <text x="84" y="232" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">sheets.write(...)</text>
  <!-- interwoven call lines -->
  <line x1="180" y1="184" x2="290" y2="202" stroke="#ADADAD" stroke-width="0.75"/>
  <line x1="200" y1="202" x2="100" y2="220" stroke="#ADADAD" stroke-width="0.75"/>
  <line x1="120" y1="220" x2="270" y2="238" stroke="#ADADAD" stroke-width="0.75"/>
  <line x1="250" y1="184" x2="110" y2="238" stroke="#ADADAD" stroke-width="0.75"/>
  <text x="72" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Contracts hidden inside the file.</text>
  <text x="72" y="308" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Swapping one API touches half</text>
  <text x="72" y="324" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the script. Failure isn't localized.</text>

  <!-- RIGHT: n8n workflow -->
