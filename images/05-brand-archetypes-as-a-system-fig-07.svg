  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Diagnose any brand's archetype from five observable inputs</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Ignore what the brand says it is. Read what its behavior commits to.</text>

  <!-- five input nodes left -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif">
    <rect x="32" y="84" width="220" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="106" font-size="12" font-weight="700" fill="#121212">1 · Tagline / positioning</text>
    <text x="44" y="124" font-size="11" fill="#545454">the archetype compressed to its smallest form</text>

    <rect x="32" y="144" width="220" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="166" font-size="12" font-weight="700" fill="#121212">2 · Visual language</text>
    <text x="44" y="184" font-size="11" fill="#545454">color, type, imagery, composition</text>

    <rect x="32" y="204" width="220" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="226" font-size="12" font-weight="700" fill="#121212">3 · What it will not do</text>
    <text x="44" y="244" font-size="11" fill="#545454">read the absences, not just the inclusions</text>

    <rect x="32" y="264" width="220" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="286" font-size="12" font-weight="700" fill="#121212">4 · Who it treats as customer</text>
    <text x="44" y="304" font-size="11" fill="#545454">the implied customer implies the archetype</text>

    <rect x="32" y="324" width="220" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="346" font-size="12" font-weight="700" fill="#121212">5 · What it does in a crisis</text>
    <text x="44" y="364" font-size="11" fill="#545454">crisis removes performance; reveals identity</text>
  </g>

