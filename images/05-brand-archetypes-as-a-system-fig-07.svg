  <title id="fig-title-05-07">Reading any brand's archetype</title>
  <desc>Five observable inputs — tagline, visual language, refusals, customer treatment, crisis behavior — converge on naming the archetype that accounts for all five. Failure to reconcile flags a hybrid or drift.</desc>
