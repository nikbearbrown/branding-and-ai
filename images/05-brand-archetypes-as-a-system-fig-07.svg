  <rect x="452" y="190" width="216" height="60" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="560" y="216" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Name the archetype</text>
  <text x="560" y="234" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">that accounts for all five</text>

  <!-- branch note -->
  <rect x="452" y="290" width="216" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="464" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">If you cannot reconcile all</text>
  <text x="464" y="328" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">five with one archetype:</text>
  <text x="464" y="346" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">a hybrid, or drift in progress.</text>
