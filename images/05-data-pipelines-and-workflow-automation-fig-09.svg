<rect x="0" y="0" width="700" height="480" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Madison Intelligence Agent — production-grade workflow architecture</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Each design choice is a response to a specific failure mode — not a stylistic preference.</text>
<rect x="64" y="100" width="120" height="40" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="124" y="117" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">Schedule</text>
<text x="124" y="131" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">every 6 hours</text>
<rect x="248" y="80" width="120" height="40" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="308" y="98" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">HTTP: RSS feeds</text>
<path d="M184 120 L248 100" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<rect x="248" y="180" width="120" height="40" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="308" y="198" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">HTTP: Google News</text>
