<rect x="248" y="280" width="120" height="40" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="308" y="298" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">HTTP: Reddit API</text>
<path d="M184 120 L248 300" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
