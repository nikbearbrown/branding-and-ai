  <rect x="40" y="110" width="140" height="70" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="110" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Schedule</text>
  <text x="110" y="154" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Trigger</text>
  <text x="110" y="172" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">every hour</text>

  <!-- Node 2 -->
  <rect x="220" y="110" width="140" height="70" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="290" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">HTTP Request</text>
  <text x="290" y="156" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">GET HN RSS feed</text>

