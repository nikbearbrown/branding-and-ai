  <rect x="400" y="110" width="140" height="70" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="470" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Code</text>
  <text x="470" y="156" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">transform + dedup</text>

  <!-- Node 4 -->
  <rect x="560" y="110" width="108" height="70" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
