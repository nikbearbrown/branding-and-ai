  <rect x="0" y="0" width="700" height="360" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The minimal pipeline that does real work — four nodes, three contracts</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Runs on a schedule, pulls fresh data, transforms it, and writes somewhere you can verify.</text>

