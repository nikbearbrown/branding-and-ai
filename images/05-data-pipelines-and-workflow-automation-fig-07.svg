<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="480" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Two pipeline implementations — same dependencies, different visibility</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">In code, contracts are buried in the file. In a workflow graph, contracts are nodes you can see, document, and swap.</text>
<rect x="56" y="80" width="272" height="340" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="72" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" letter-spacing="1.2">PYTHON SCRIPT</text>
<line x1="72" y1="108" x2="312" y2="108" stroke="#8a8480" stroke-width="0.75"/>
<text x="72" y="132" font-family="Courier New, monospace" font-size="10" fill="#1a1714">def run():</text>
<text x="72" y="154" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    raw = requests.get(REDDIT_URL)</text>
<text x="72" y="176" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    items = parse(raw.text)</text>
<text x="72" y="198" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    seen = load_seen_urls()</text>
<text x="72" y="220" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    items = dedup(items, seen)</text>
<text x="72" y="242" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    scored = call_openai(items)</text>
<text x="72" y="264" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    write_to_sheet(scored)</text>
<text x="72" y="286" font-family="Courier New, monospace" font-size="10" fill="#1a1714">    write_log(len(scored))</text>
<line x1="72" y1="318" x2="312" y2="318" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="192" y="346" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Dependencies interwoven.</text>
<text x="192" y="362" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Contracts unlabeled.</text>
<text x="192" y="392" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#1a1714" text-anchor="middle">Swap one API → touch the file.</text>
<rect x="372" y="80" width="272" height="340" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="388" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" letter-spacing="1.2">n8n WORKFLOW</text>
<line x1="388" y1="108" x2="628" y2="108" stroke="#8a8480" stroke-width="0.75"/>
<rect x="444" y="118" width="160" height="28" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="524" y="137" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Schedule</text>
<rect x="444" y="158" width="160" height="28" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="524" y="177" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">HTTP: Reddit</text>
<rect x="444" y="198" width="160" height="28" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="524" y="217" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Code: dedup</text>
<rect x="444" y="238" width="160" height="28" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="524" y="257" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">OpenAI score</text>
<rect x="444" y="278" width="160" height="28" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="524" y="297" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Sheets: write</text>
<path d="M524 146 L524 158" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M524 186 L524 198" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M524 226 L524 238" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M524 266 L524 278" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M604 172 L632 172" stroke="#1a1714" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text x="380" y="362" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">Each contract = one node.</text>
<text x="380" y="378" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">Swap a node without touching the rest.</text>
<text x="508" y="402" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#1a1714" text-anchor="middle">Discipline becomes structural.</text>
<text x="350.0" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">A Python pipeline can achieve the same result with sufficient discipline. n8n makes the discipline structural rather than optional.</text>
</svg>