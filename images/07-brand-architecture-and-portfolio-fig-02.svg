<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-07-02">
  <title id="fig-title-07-02">Branded house vs. house of brands trade-off</title>
  <desc>Two side-by-side panels comparing the branded-house and house-of-brands structures across structure, the bet each makes, the benefit, and the cost. Shared equity is shared risk on the left; risk isolation at high cost on the right.</desc>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Two poles, two bets: what each architecture optimizes for</text>

  <!-- left panel -->
  <rect x="40" y="60" width="290" height="340" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Branded house</text>
  <text x="56" y="104" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Apple · FedEx</text>
  <!-- right panel -->
  <rect x="370" y="60" width="290" height="340" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="386" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">House of brands</text>
  <text x="386" y="104" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">P&amp;G · Unilever</text>

  <!-- dividing line -->
  <line x1="350" y1="60" x2="350" y2="400" stroke="#D4D4D4" stroke-width="1"/>

  <!-- row labels down the gutter via repeated rows -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11">
    <!-- Structure -->
    <text x="56" y="140" fill="#545454" font-weight="700">Structure</text>
    <text x="56" y="158" fill="#121212">One master brand across</text>
    <text x="56" y="174" fill="#121212">all offerings; one name.</text>
    <text x="386" y="140" fill="#545454" font-weight="700">Structure</text>
    <text x="386" y="158" fill="#121212">Independent brands, each</text>
    <text x="386" y="174" fill="#121212">named; parent invisible.</text>

    <line x1="56" y1="190" x2="314" y2="190" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="386" y1="190" x2="644" y2="190" stroke="#D4D4D4" stroke-width="0.75"/>

    <!-- The bet -->
    <text x="56" y="214" fill="#545454" font-weight="700">The bet</text>
    <text x="56" y="232" fill="#121212">Shared reputation beats</text>
    <text x="56" y="248" fill="#121212">risk containment.</text>
    <text x="386" y="214" fill="#545454" font-weight="700">The bet</text>
    <text x="386" y="232" fill="#121212">Precise targeting and</text>
    <text x="386" y="248" fill="#121212">isolation beat efficiency.</text>

    <line x1="56" y1="264" x2="314" y2="264" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="386" y1="264" x2="644" y2="264" stroke="#D4D4D4" stroke-width="0.75"/>

    <!-- Benefit -->
    <text x="56" y="288" fill="#545454" font-weight="700">Benefit</text>
    <text x="56" y="306" fill="#121212">Equity compounds; new</text>
    <text x="56" y="322" fill="#121212">launches inherit trust.</text>
    <text x="386" y="288" fill="#545454" font-weight="700">Benefit</text>
    <text x="386" y="306" fill="#121212">Risk isolated; surgical</text>
    <text x="386" y="322" fill="#121212">targeting per brand.</text>

    <line x1="56" y1="338" x2="314" y2="338" stroke="#D4D4D4" stroke-width="0.75"/>
    <line x1="386" y1="338" x2="644" y2="338" stroke="#D4D4D4" stroke-width="0.75"/>

    <!-- Cost -->
    <text x="56" y="362" fill="#545454" font-weight="700">Cost</text>
    <text x="56" y="380" fill="#121212">Shared equity = shared</text>
    <text x="56" y="396" fill="#121212">risk (Samsung Note 7).</text>
    <text x="386" y="362" fill="#545454" font-weight="700">Cost</text>
    <text x="386" y="380" fill="#121212">Build each from scratch;</text>
    <text x="386" y="396" fill="#121212">expensive at scale.</text>
  </g>
</svg>
