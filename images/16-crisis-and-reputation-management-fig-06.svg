  <rect x="0" y="0" width="700" height="400" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Personal-brand crisis scenarios, mapped to SCCT</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Triage at the alert stage selects the response template before anything is written.</text>

  <!-- header -->
  <rect x="32" y="72" width="636" height="32" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
