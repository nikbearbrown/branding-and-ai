  <!-- row 1: content error -->
  <rect x="32" y="104" width="636" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Content error</text>
  <text x="40"  y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">published something</text>
  <text x="40"  y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">factually wrong</text>
  <text x="206" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">accidental →</text>
  <text x="206" y="142" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">diminish</text>
  <text x="206" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">correct it publicly</text>
  <text x="396" y="133" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">credible report of an</text>
  <text x="396" y="147" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">error in a published piece</text>
  <text x="560" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">self-decide;</text>
  <text x="560" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">no legal</text>

  <!-- row 2: systematic bad advice -->
  <rect x="32" y="176" width="636" height="76" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Systematic</text>
  <text x="40"  y="215" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">bad advice</text>
  <text x="40"  y="233" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">a pattern of backfires</text>
  <text x="206" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">accidental →</text>
  <text x="206" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">preventable →</text>
  <text x="206" y="232" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">diminish then rebuild</text>
  <text x="396" y="205" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">multiple reports of the</text>
  <text x="396" y="219" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">same recommendation</text>
  <text x="396" y="233" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">failing</text>
  <text x="560" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">consider</text>
  <text x="560" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">legal if harm</text>

  <!-- row 3: personal conduct -->
  <rect x="32" y="252" width="636" height="76" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="276" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Personal</text>
  <text x="40"  y="291" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">conduct</text>
  <text x="40"  y="309" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">your own action</text>
  <text x="40"  y="323" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">comes to light</text>
  <text x="206" y="278" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">preventable →</text>
  <text x="206" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">mortification</text>
  <text x="206" y="314" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">acknowledge, apologize</text>
  <text x="396" y="283" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">any credible surfacing of</text>
  <text x="396" y="297" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">conduct conflicting with</text>
  <text x="396" y="311" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">the trusted-advisor role</text>
  <text x="560" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">legal review</text>
  <text x="560" y="304" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">advisable</text>

  <text x="32" y="354" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The accidental holding statement investigates and promises a response; the preventable one accepts responsibility</text>
  <text x="32" y="370" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">immediately. Every statement is marked DRAFT — human approval required; no monitor alert triggers a response on its own.</text>
</svg>
