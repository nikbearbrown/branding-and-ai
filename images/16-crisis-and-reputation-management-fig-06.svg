  <title id="fig-title-16-06">Personal-brand crisis scenarios mapped to SCCT</title>
  <desc>Applying SCCT to the worked-example education brand in three rows ordered by rising responsibility: a content error (accidental, diminish), systematic bad advice (accidental escalating to preventable, diminish then rebuild), and personal conduct (preventable, mortification). Columns give the SCCT type, monitoring threshold, holding-statement posture, and escalation note.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
