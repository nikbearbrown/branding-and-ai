  <rect x="0" y="0" width="700" height="400" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Refresh or rebrand? The decision spectrum</text>

