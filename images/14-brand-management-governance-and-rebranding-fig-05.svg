  <text x="380" y="338" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">illegitimate trigger — the one that causes the most avoidable damage</text>

  <!-- equity risk indicator -->
  <text x="80" y="262" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">low equity risk</text>
  <text x="620" y="262" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">high equity risk</text>
  <line x1="150" y1="252" x2="550" y2="252" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="5 4"/>

  <text x="32" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Cautionary cases — Tropicana 2009, Gap 2010, New Coke 1985 — all failed this decision.</text>
