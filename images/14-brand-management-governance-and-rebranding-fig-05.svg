  <text x="80" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Refresh</text>
  <text x="80" y="216" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">evolution · core holds</text>
  <text x="80" y="230" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">old brand still legible</text>
  <text x="620" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Rebrand</text>
  <text x="620" y="216" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">revolution · new identity</text>
  <text x="620" y="230" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">previous brand not legible</text>

  <!-- Trigger markers above the line (legitimate, ink) -->
  <line x1="180" y1="170" x2="180" y2="120" stroke="#787878" stroke-width="1"/>
