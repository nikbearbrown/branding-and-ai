  <text x="180" y="96" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">modernize the mark</text>

  <line x1="300" y1="170" x2="300" y2="140" stroke="#787878" stroke-width="1"/>
  <circle cx="300" cy="170" r="3" fill="#121212"/>
  <text x="300" y="130" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">outgrown identity</text>

  <line x1="460" y1="170" x2="460" y2="140" stroke="#787878" stroke-width="1"/>
  <circle cx="460" cy="170" r="3" fill="#121212"/>
  <text x="460" y="130" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">repositioning</text>

  <line x1="560" y1="170" x2="560" y2="120" stroke="#787878" stroke-width="1"/>
  <circle cx="560" cy="170" r="3" fill="#121212"/>
  <text x="560" y="110" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">merger · damage</text>
  <text x="560" y="96" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">to leave behind</text>

  <!-- Illegitimate trigger below (RED) -->
  <line x1="380" y1="170" x2="380" y2="262" stroke="#C8102E" stroke-width="1.5"/>
