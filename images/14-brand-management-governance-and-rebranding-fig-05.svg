<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-14-05">
  <title id="fig-title-14-05">Refresh versus rebrand: the decision spectrum</title>
  <desc>Change runs from refresh — evolution where the core identity holds and the old brand stays legible — to rebrand, revolution where the previous brand is no longer legible. Triggers sit along the spectrum; the new-executive-preference trigger is flagged as the illegitimate one that causes the most avoidable damage.</desc>
