  <text x="40" y="77" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Pathway</text>
  <text x="210" y="77" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">What goes wrong</text>
  <text x="450" y="77" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Diagnostic question</text>

  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">
    <!-- Row 1 -->
    <rect x="32" y="90" width="170" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="202" y="90" width="240" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="442" y="90" width="226" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="116" font-weight="700">1 — Emotional register</text>
    <text x="40" y="134" fill="#545454">the archetype cannot</text>
    <text x="40" y="148" fill="#545454">deliver authentically</text>
    <text x="210" y="116">Shape needs stakes,</text>
    <text x="210" y="132">conflict, or shadow the</text>
    <text x="210" y="148">brand's language is not</text>
    <text x="210" y="164">built to hold.</text>
    <text x="450" y="116">Can my archetype hold</text>
    <text x="450" y="132">the emotions this shape</text>
    <text x="450" y="148">demands without</text>
    <text x="450" y="164">performing them?</text>

    <!-- Row 2 -->
    <rect x="32" y="178" width="170" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="202" y="178" width="240" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="442" y="178" width="226" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="204" font-weight="700">2 — Inconsistent role</text>
    <text x="40" y="222" fill="#545454">story casts the brand</text>
    <text x="40" y="236" fill="#545454">against its archetype</text>
    <text x="210" y="204">The brand's position —</text>
    <text x="210" y="220">hero, guide, transformer —</text>
    <text x="210" y="236">contradicts a foundational</text>
    <text x="210" y="252">commitment.</text>
    <text x="450" y="204">Does the role this story</text>
    <text x="450" y="220">assigns the brand match</text>
    <text x="450" y="236">what the archetype</text>
    <text x="450" y="252">already promises?</text>

    <!-- Row 3 -->
    <rect x="32" y="266" width="170" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="202" y="266" width="240" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="442" y="266" width="226" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="292" font-weight="700">3 — Borrowed content</text>
    <text x="40" y="310" fill="#545454">cultural material owned</text>
    <text x="40" y="324" fill="#545454">by another archetype</text>
    <text x="210" y="292">Subject matter belongs to</text>
    <text x="210" y="308">an archetype the brand</text>
    <text x="210" y="324">does not inhabit; reads as</text>
    <text x="210" y="340">exploitation.</text>
    <text x="450" y="292">What cultural content does</text>
    <text x="450" y="308">this use, and which</text>
    <text x="450" y="324">archetype owns it?</text>
  </g>
