  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Three failure pathways for an archetype-narrative mismatch</text>

  <!-- Header -->
  <rect x="32" y="56" width="170" height="34" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="202" y="56" width="240" height="34" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
