<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-11-03">
  <title id="fig-title-11-03">Customer journey map with front and back stage</title>
  <desc>Seven journey stages from awareness to advocacy. Above the line of visibility are front-stage touchpoints and the brand's job. Below it are the back-stage operations a front-stage promise depends on, following Shostack's service blueprint.</desc>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The journey map: front-stage touchpoints over back-stage operations</text>

  <defs>
    <marker id="arrow1103" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#121212"/>
    </marker>
  </defs>

  <!-- seven stage columns -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" text-anchor="middle">
    <!-- front-stage boxes -->
    <g>
      <rect x="40" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
      <rect x="130" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
      <rect x="220" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
      <rect x="310" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
      <rect x="400" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
      <rect x="490" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
      <rect x="580" y="74" width="82" height="92" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    </g>
    <!-- stage names -->
    <g font-size="11" fill="#121212" font-weight="700">
      <text x="81" y="92">Awareness</text>
      <text x="171" y="92">Consider</text>
      <text x="261" y="92">Purchase</text>
      <text x="351" y="92">Onboard</text>
      <text x="441" y="92">Use</text>
      <text x="531" y="92">Renewal</text>
      <text x="621" y="92">Advocacy</text>
    </g>
    <!-- touchpoint + job -->
    <g fill="#545454">
      <text x="81" y="112">ad / search</text>
      <text x="81" y="130">be found</text>
      <text x="171" y="112">homepage</text>
      <text x="171" y="130">prove fit</text>
      <text x="261" y="112">checkout</text>
      <text x="261" y="130">reassure</text>
      <text x="351" y="112">first email</text>
      <text x="351" y="130">activate</text>
      <text x="441" y="112">the product</text>
      <text x="441" y="130">deliver value</text>
      <text x="531" y="112">renewal note</text>
      <text x="531" y="130">justify</text>
      <text x="621" y="112">referral ask</text>
      <text x="621" y="130">delight</text>
    </g>
    <!-- emotional state -->
    <g fill="#545454" font-size="9">
      <text x="81" y="150">curious</text>
      <text x="171" y="150">comparing</text>
      <text x="261" y="150">cautious</text>
      <text x="351" y="150">hopeful</text>
      <text x="441" y="150">working</text>
      <text x="531" y="150">deciding</text>
      <text x="621" y="150">satisfied</text>
    </g>
  </g>

  <!-- line of visibility -->
  <line x1="40" y1="200" x2="662" y2="200" stroke="#121212" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="40" y="194" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212" font-weight="700">line of visibility</text>

  <!-- back-stage row -->
  <text x="40" y="230" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" font-weight="700">Back-stage operational dependency (Shostack blueprint)</text>
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" text-anchor="middle" fill="#121212">
    <rect x="130" y="244" width="82" height="60" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="171" y="266">content +</text>
    <text x="171" y="280">analytics</text>
    <rect x="310" y="244" width="82" height="60" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="351" y="266">provisioning</text>
    <text x="351" y="280">+ data setup</text>
    <rect x="490" y="244" width="82" height="60" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="531" y="266">billing +</text>
    <text x="531" y="280">support ops</text>
  </g>
  <!-- dependency arrows down -->
  <g stroke="#121212" stroke-width="1" fill="none">
    <line x1="171" y1="166" x2="171" y2="244" marker-end="url(#arrow1103)"/>
    <line x1="351" y1="166" x2="351" y2="244" marker-end="url(#arrow1103)"/>
    <line x1="531" y1="166" x2="531" y2="244" marker-end="url(#arrow1103)"/>
  </g>

  <text x="32" y="344" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">A promise made at the front stage is only as good as the operation behind it. The gap is where brand promises die.</text>
  <text x="32" y="366" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The map's value is the moment you see where two adjacent touchpoints communicate contradictory things — a seam.</text>
</svg>
