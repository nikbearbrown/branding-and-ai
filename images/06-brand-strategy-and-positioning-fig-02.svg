<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-06-02">
  <title id="fig-title-06-02">The seven brand components</title>
  <desc>Mission, vision, values, UVP, archetype, voice, positioning — each with the job only it does, the Stripe example, and what breaks without it.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="06-brand-strategy-and-positioning"
      figure-number="02" figure-title="The seven brand components" figure-slug="seven-brand-components"
      figure-type="comparison table" priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/06-brand-strategy-and-positioning-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Seven components, each doing a job the others cannot</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Read the Stripe column as one coherent strategy. Each component constrains the others.</text>

  <!-- header -->
  <rect x="32" y="68" width="100" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="132" y="68" width="220" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="352" y="68" width="180" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="532" y="68" width="136" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="88" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Component</text>
  <text x="140" y="88" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">The job only it does</text>
  <text x="360" y="88" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Stripe example</text>
  <text x="540" y="88" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Breaks without it</text>

  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10.5">
    <!-- rows 50 tall starting 98 -->
    <!-- Mission -->
    <rect x="32" y="98" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="98" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="98" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="98" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="126" font-weight="700" fill="#121212">Mission</text>
    <text x="140" y="120" fill="#121212">What the company exists to</text>
    <text x="140" y="134" fill="#121212">do; resolves "build what?"</text>
    <text x="360" y="126" fill="#545454">Increase the GDP of the internet.</text>
    <text x="540" y="126" fill="#545454">No build/scope test.</text>

    <!-- Vision -->
    <rect x="32" y="148" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="148" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="148" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="148" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="176" font-weight="700" fill="#121212">Vision</text>
    <text x="140" y="170" fill="#121212">The changed world if the</text>
    <text x="140" y="184" fill="#121212">mission succeeds.</text>
    <text x="360" y="170" fill="#545454">Any business transacts like a</text>
    <text x="360" y="184" fill="#545454">Fortune 500.</text>
    <text x="540" y="176" fill="#545454">No direction.</text>

    <!-- Values -->
    <rect x="32" y="198" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="198" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="198" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="198" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="226" font-weight="700" fill="#121212">Values</text>
    <text x="140" y="220" fill="#121212">Commitments kept when</text>
    <text x="140" y="234" fill="#121212">keeping them is costly.</text>
    <text x="360" y="226" fill="#545454">Documentation as product.</text>
    <text x="540" y="220" fill="#545454">Preferences override</text>
    <text x="540" y="234" fill="#545454">under deadline.</text>

    <!-- UVP -->
    <rect x="32" y="248" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="248" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="248" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="248" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="276" font-weight="700" fill="#121212">UVP</text>
    <text x="140" y="270" fill="#121212">What you offer that rivals do</text>
    <text x="140" y="284" fill="#121212">not — falsifiable.</text>
    <text x="360" y="270" fill="#545454">Clean API, 7 lines, no sales</text>
    <text x="360" y="284" fill="#545454">call to understand.</text>
    <text x="540" y="276" fill="#545454">No reason to choose you.</text>

    <!-- Archetype -->
    <rect x="32" y="298" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="298" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="298" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="298" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="326" font-weight="700" fill="#121212">Archetype</text>
    <text x="140" y="320" fill="#121212">The role in the audience's</text>
    <text x="140" y="334" fill="#121212">story; makes decisions cohere.</text>
    <text x="360" y="326" fill="#545454">Sage — patient, evidence-based.</text>
    <text x="540" y="326" fill="#545454">Incoherent decisions.</text>

    <!-- Voice -->
    <rect x="32" y="348" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="348" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="348" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="348" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="376" font-weight="700" fill="#121212">Voice</text>
    <text x="140" y="370" fill="#121212">How it speaks; encodes</text>
    <text x="140" y="384" fill="#121212">audience and archetype.</text>
    <text x="360" y="370" fill="#545454">Precise, serious, slightly</text>
    <text x="360" y="384" fill="#545454">understated.</text>
    <text x="540" y="376" fill="#545454">Signals the wrong reader.</text>

    <!-- Positioning -->
    <rect x="32" y="398" width="100" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="132" y="398" width="220" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="352" y="398" width="180" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <rect x="532" y="398" width="136" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="40" y="426" font-weight="700" fill="#121212">Positioning</text>
    <text x="140" y="420" fill="#121212">Where you sit vs. the actual</text>
    <text x="140" y="434" fill="#121212">alternative the buyer weighs.</text>
    <text x="360" y="420" fill="#545454">vs. building your own / not</text>
    <text x="360" y="434" fill="#545454">building at all.</text>
    <text x="540" y="426" fill="#545454">Fight the wrong rival.</text>
  </g>

  <text x="32" y="454" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH. 6, THE SEVEN COMPONENTS</text>
</svg>
