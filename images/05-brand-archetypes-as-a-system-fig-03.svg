  <rect x="0" y="0" width="700" height="380" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Read the motivation, not the dictionary definition</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The names mislead if taken literally. The brand meaning is the working one.</text>

  <!-- column headers -->
  <text x="200" y="92" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#545454">LITERAL READING</text>
  <text x="500" y="92" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">BRAND-STRATEGY READING</text>
  <line x1="350" y1="100" x2="350" y2="356" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Hero row -->
  <text x="44" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Hero</text>
  <text x="110" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#787878" text-decoration="line-through">A noble, admirable brand.</text>
  <line x1="110" y1="134" x2="320" y2="134" stroke="#787878" stroke-width="1"/>
  <text x="368" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">The customer becomes better</text>
  <text x="368" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">through effort; the brand is the</text>
  <text x="368" y="164" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">equipment. (Nike)</text>
  <line x1="32" y1="180" x2="668" y2="180" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Outlaw row -->
  <text x="44" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Outlaw</text>
  <text x="110" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#787878">An illegal or antisocial brand.</text>
  <line x1="110" y1="218" x2="328" y2="218" stroke="#787878" stroke-width="1"/>
  <text x="368" y="216" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">A weekend escape from the</text>
  <text x="368" y="232" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">system, for accountants who</text>
  <text x="368" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">want to feel free. (Harley)</text>
  <line x1="32" y1="264" x2="668" y2="264" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Caregiver row -->
  <text x="44" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Caregiver</text>
  <text x="110" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#787878">A soft, low-status brand.</text>
  <line x1="110" y1="302" x2="300" y2="302" stroke="#787878" stroke-width="1"/>
  <text x="368" y="300" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">We protect the ones who</text>
  <text x="368" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">cannot protect themselves.</text>
  <text x="368" y="332" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">(Johnson &amp; Johnson)</text>

