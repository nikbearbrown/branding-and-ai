  <title id="fig-title-05-03">Name versus meaning</title>
  <desc>Three archetype names whose literal reading misleads — Hero, Outlaw, Caregiver — with the struck-through dictionary reading on the left and the brand-strategy meaning on the right.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
