  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The argument is one; the applications are many</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Each project is a different instantiation of the same taxonomy and phase gate.</text>

