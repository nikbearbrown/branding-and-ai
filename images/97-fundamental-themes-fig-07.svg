  <title id="fig-title-97-07">One framework, four applications</title>
  <desc>A hub-and-spoke map. At the center is the Irreducibly Human taxonomy and phase gate. Four spokes connect to its applications: AI+1 in employment economics, Brutalist in creative production, Boondoggling in software engineering, and Frictional as the empirical foundation.</desc>
