<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-15-06">
  <title id="fig-title-15-06">The cost of hypocrisy: trust asymmetry</title>
  <desc>Two trust trajectories over time both drop at the same scandal event. A brand that made no values claim falls to a recoverable level and climbs back; a brand that claimed to lead on the thing it then violated falls further and recovers slower. The gap between final levels is labeled the cost of hypocrisy.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="15-brand-ethics-purpose-and-sustainability" figure-number="06"
      figure-title="The cost of hypocrisy: trust asymmetry"
      figure-slug="cost-of-hypocrisy-trust-asymmetry"
      figure-type="annotated line chart" priority="Critical"
      author="Nik Bear Brown &amp; Nina Harris" date-generated="2026-06-18"
      source-file="pantry/15-brand-ethics-purpose-and-sustainability-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The cost of hypocrisy</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Values claims without behavior erode trust faster than silence. Same scandal, two different starting promises.</text>

  <!-- plot region -->
  <rect x="64" y="80" width="556" height="260" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- axes -->
  <line x1="64" y1="340" x2="620" y2="340" stroke="#121212" stroke-width="1"/>
  <line x1="64" y1="80"  x2="64"  y2="340" stroke="#121212" stroke-width="1"/>
  <text x="342" y="362" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">time →</text>
  <text x="48" y="210" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 48 210)">audience trust →</text>

  <!-- scandal event marker -->
  <line x1="280" y1="80" x2="280" y2="340" stroke="#121212" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="286" y="96" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">scandal event</text>

  <!-- both start at same trust level y=130 -->
  <!-- no-claim line (grey): flat, drops to ~210, recovers toward ~150 -->
  <path fill="none" stroke="#787878" stroke-width="1.5"
    d="M64,130 L280,130 L320,210 C 420,210 520,170 620,160"/>
  <text x="626" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#787878">no</text>
  <text x="626" y="173" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#787878">claim</text>

  <!-- claimed-and-violated line (ink): starts slightly higher (claim inflated it), drops much further to ~300, recovers slowly toward ~260 -->
  <path fill="none" stroke="#121212" stroke-width="1.5"
    d="M64,118 L280,118 L320,300 C 440,300 520,280 620,262"/>
  <text x="118" y="110" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">claim inflates the expectation</text>
  <text x="402" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">claimed to lead — then violated</text>

  <!-- the cost-of-hypocrisy gap bracket at the right between the two final levels -->
  <line x1="596" y1="160" x2="596" y2="262" stroke="#121212" stroke-width="1"/>
  <line x1="590" y1="160" x2="602" y2="160" stroke="#121212" stroke-width="1"/>
  <line x1="590" y1="262" x2="602" y2="262" stroke="#121212" stroke-width="1"/>
  <text x="560" y="206" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">the cost</text>
  <text x="560" y="220" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">of hypocrisy</text>

  <text x="32" y="388" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The claim inflated the expectation; the violation deflates it by the full inflated amount. Net damage exceeds saying</text>
  <text x="32" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">nothing. Proactive disclosure of a limitation is almost always less damaging than discovered hypocrisy.</text>
</svg>
