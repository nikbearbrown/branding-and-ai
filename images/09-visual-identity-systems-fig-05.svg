<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-09-05">
  <title id="fig-title-09-05">Creative brief — eight sections</title>
  <desc>The eight sections of a creative brief as ordered constraint blocks: brand strategy summary, project scope, audience, tone words, references, anti-references, constraints, deliverables. Each answers a specific question, and every sentence is a constraint.</desc>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The creative brief: eight constraint blocks, every sentence a constraint</text>

  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif">
    <!-- column 1 -->
    <rect x="40" y="64" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="54" y="86" font-size="12" font-weight="700" fill="#121212">1 · Brand strategy summary</text>
    <text x="54" y="106" font-size="11" fill="#545454">Q: what strategy must the design express?</text>

    <rect x="40" y="130" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="54" y="152" font-size="12" font-weight="700" fill="#121212">2 · Project scope</text>
    <text x="54" y="172" font-size="11" fill="#545454">Q: what, specifically, is being designed?</text>

    <rect x="40" y="196" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="54" y="218" font-size="12" font-weight="700" fill="#121212">3 · Audience</text>
    <text x="54" y="238" font-size="11" fill="#545454">Q: who must read it as trustworthy?</text>

    <rect x="40" y="262" width="300" height="58" fill="#C8860E" fill-opacity="0.08" stroke="#C8860E" stroke-width="1"/>
    <text x="54" y="284" font-size="12" font-weight="700" fill="#121212">4 · Tone words</text>
    <text x="54" y="304" font-size="11" fill="#545454">Q: how should it feel? (no anti-words)</text>

    <!-- column 2 -->
    <rect x="360" y="64" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="374" y="86" font-size="12" font-weight="700" fill="#121212">5 · References</text>
    <text x="374" y="106" font-size="11" fill="#545454">Q: what direction, with what working in it?</text>

    <rect x="360" y="130" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="374" y="152" font-size="12" font-weight="700" fill="#121212">6 · Anti-references</text>
    <text x="374" y="172" font-size="11" fill="#545454">Q: what to avoid, and why it fails?</text>

    <rect x="360" y="196" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="374" y="218" font-size="12" font-weight="700" fill="#121212">7 · Constraints</text>
    <text x="374" y="238" font-size="11" fill="#545454">Q: platform, accessibility, inherited?</text>

    <rect x="360" y="262" width="300" height="58" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="374" y="284" font-size="12" font-weight="700" fill="#121212">8 · Deliverables</text>
    <text x="374" y="304" font-size="11" fill="#545454">Q: what, exactly, must be produced?</text>
  </g>

  <!-- anti-words callout -->
  <rect x="40" y="344" width="620" height="58" fill="#FFFFFF" stroke="#C8860E" stroke-width="3"/>
  <text x="56" y="366" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Tone-word discipline</text>
  <text x="56" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Forbidden anti-words: innovative · modern · clean · professional. They constrain nothing. Use archetype-specific words: "restrained, evidence-forward, patient" (Sage); "decisive, saturated, kinetic" (Hero).</text>

  <text x="32" y="428" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">One to two pages, no padding. A sentence that cannot evaluate a design decision should be cut.</text>
</svg>
