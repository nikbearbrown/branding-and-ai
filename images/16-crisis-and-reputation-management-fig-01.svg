  <line x1="500" y1="220" x2="500" y2="232" stroke="#545454" stroke-width="1"/>
  <text x="310" y="218" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">the first day of the narrative, lost in silence</text>

  <text x="32" y="332" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Equity accumulates over years of consistent interactions and can leak in hours. Social media compressed the response</text>
  <text x="32" y="348" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">window; the playbook exists to make the slow decisions in advance so the fast moment is execution, not judgment.</text>
