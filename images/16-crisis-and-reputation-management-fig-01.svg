  <title id="fig-title-16-01">Years to build, hours to lose: the United Airlines April 2017 timeline</title>
  <desc>A timeline on an hours-from-incident axis showing how the story propagated faster than the company responded: video recorded and posted within minutes, the first million views, the CEO's first statement the next morning, and a second statement later. The response lag is set against the propagation curve.</desc>
