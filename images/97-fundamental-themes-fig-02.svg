<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-97-02">
  <title id="fig-title-97-02">The Frictional mechanism</title>
  <desc>A causal chain showing how prediction error fires dopamine, upregulates BDNF, strengthens synapses, and forms durable memory. A parallel lower track shows the AI-shortcut path where removing friction removes the trigger, so no consolidation occurs and the brain is unchanged.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="97-fundamental-themes"
