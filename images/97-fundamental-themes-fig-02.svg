      <polygon points="0 0, 8 3, 0 6" fill="#C8102E"/>
    </marker>
  </defs>

  <!-- TOP TRACK: the learning mechanism -->
  <text x="32" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">With friction — the learning fires</text>

  <rect x="32" y="104" width="120" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="92" y="126" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Prediction error</text>
  <text x="92" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">material doesn't fit</text>
  <line x1="152" y1="130" x2="174" y2="130" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="176" y="104" width="120" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="236" y="126" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Dopamine fires,</text>
  <text x="236" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">BDNF upregulates</text>
  <line x1="296" y1="130" x2="318" y2="130" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="104" width="120" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="380" y="126" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Synapses strengthen,</text>
  <text x="380" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">spines form</text>
  <line x1="440" y1="130" x2="462" y2="130" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

