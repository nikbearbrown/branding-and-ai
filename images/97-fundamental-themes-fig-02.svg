  <text x="380" y="250" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">No consolidation,</text>
  <text x="380" y="264" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">no durable learning</text>
  <line x1="440" y1="254" x2="462" y2="254" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="464" y="228" width="120" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="524" y="250" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Artifact is fine,</text>
  <text x="524" y="264" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">brain is unchanged</text>

  <!-- bottom note -->
  <line x1="32" y1="312" x2="668" y2="312" stroke="#D4D4D4" stroke-width="1"/>
  <text x="32" y="334" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">The fluency of the AI's output is indistinguishable from the feeling of mastery &#8212; but the neurological events that produce mastery</text>
  <text x="32" y="348" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">never occurred. AI should make the struggle more productive, not eliminate it.</text>
