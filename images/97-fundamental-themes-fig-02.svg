  <text x="524" y="126" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Durable memory</text>
  <text x="524" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">capability built</text>

  <!-- BOTTOM TRACK: the AI shortcut -->
  <text x="32" y="216" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">AI removes friction — the trigger never arrives</text>

