<text x="350" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#4a4540" text-anchor="middle">this is the practice,</text>
<text x="350" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#4a4540" text-anchor="middle">not the project</text>
<text x="350.0" y="446" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">The signals that separated you — the deployed tool, the positioned brand, the published writing — are the costly signals that AI tooling did not make cheap.</text>
