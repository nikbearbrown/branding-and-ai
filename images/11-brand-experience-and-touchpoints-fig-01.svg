<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-11-01">
  <title id="fig-title-11-01">The strategy-experience gap</title>
  <desc>Two layers: the brand strategy the company knows (positioning, archetype, visual identity) and the brand experience the customer meets (ad, onboarding email, support chat, error message, cancellation flow). Equity leaks where an un-designed operational touchpoint contradicts the strategy.</desc>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The gap: what the company knows vs. what the customer experiences</text>

  <!-- strategy layer -->
  <text x="40" y="72" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="700">Brand strategy — what the company knows</text>
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212" text-anchor="middle">
    <rect x="60" y="84" width="160" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="140" y="111">Positioning</text>
    <rect x="270" y="84" width="160" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="350" y="111">Archetype</text>
    <rect x="480" y="84" width="160" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="560" y="111">Visual identity</text>
  </g>

  <!-- experience layer -->
  <text x="40" y="300" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" font-weight="700">Brand experience — what the customer meets</text>
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212" text-anchor="middle">
    <rect x="40" y="312" width="110" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="95" y="339">Ad</text>
    <rect x="160" y="312" width="110" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="215" y="333">Onboarding</text>
    <text x="215" y="347" font-size="10" fill="#545454">email</text>
    <!-- the leak point: support chat, red -->
    <rect x="280" y="312" width="110" height="44" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
    <text x="335" y="333" fill="#C8102E">Support chat</text>
    <text x="335" y="347" font-size="10" fill="#C8102E">un-designed</text>
    <rect x="400" y="312" width="110" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="455" y="333">Error</text>
    <text x="455" y="347" font-size="10" fill="#545454">message</text>
    <rect x="520" y="312" width="120" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="580" y="333">Cancellation</text>
    <text x="580" y="347" font-size="10" fill="#545454">flow</text>
  </g>

  <!-- alignment arrows -->
  <g stroke="#121212" stroke-width="1" stroke-dasharray="4 3">
    <line x1="140" y1="128" x2="95" y2="312"/>
    <line x1="350" y1="128" x2="215" y2="312"/>
    <line x1="560" y1="128" x2="455" y2="312"/>
  </g>

  <!-- equity leaks here (annotation in ink; the single red element is the support-chat box) -->
  <text x="335" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212" text-anchor="middle">↑ equity leaks at the touchpoint nobody designed</text>

  <text x="32" y="412" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">A brilliant positioning statement that contradicts the support experience loses to the support experience — every time.</text>
  <text x="32" y="432" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">People believe what happens to them, not what you claim.</text>
</svg>
