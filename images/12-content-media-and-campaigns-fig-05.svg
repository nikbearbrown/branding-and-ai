  <title id="fig-title-12-05">Reach versus frequency, set by goal</title>
  <desc>At a fixed budget, reach and frequency trade off. An awareness goal favors high reach and low frequency; a conversion goal favors high frequency and low reach. The common error is optimizing for reach when the goal needs frequency.</desc>
