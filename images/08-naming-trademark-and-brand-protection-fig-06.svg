<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-08-06">
  <title id="fig-title-08-06">What AI can and cannot clear</title>
  <desc>Two columns split by the AI+1 boundary. AI can generate candidates, classify on the spectrum, flag cross-language issues, and check obvious domain availability. AI cannot run the live USPTO search, assess likelihood of confusion, clear a mark, or give legal advice.</desc>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The AI+1 boundary: generation vs. clearance</text>

  <!-- left column -->
  <rect x="40" y="64" width="290" height="300" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="90" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">AI can do this</text>
  <text x="56" y="108" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">pattern recognition and retrieval</text>
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">
    <text x="56" y="148">Generate large candidate sets</text>
    <text x="56" y="184">Classify on the strength spectrum</text>
    <text x="56" y="220">Flag obvious cross-language issues</text>
    <text x="56" y="256">Spot glaring phonetic conflicts</text>
    <text x="56" y="292">Check obvious domain availability</text>
  </g>

  <!-- right column -->
  <rect x="370" y="64" width="290" height="300" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="386" y="90" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">AI cannot do this</text>
  <text x="386" y="108" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">it has no access to the live register</text>
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">
    <text x="386" y="148">Run a live USPTO search</text>
    <text x="386" y="184">Assess likelihood of confusion</text>
    <text x="386" y="220">Clear a mark</text>
    <text x="386" y="256">Give legal advice</text>
    <text x="386" y="292">Interpret a search it never ran</text>
  </g>

  <!-- the AI+1 boundary line (heavy ink, NOT red) -->
  <line x1="350" y1="64" x2="350" y2="364" stroke="#121212" stroke-width="2.5"/>
  <text x="350" y="384" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212" text-anchor="middle" font-weight="700">AI+1 boundary</text>

  <text x="32" y="416" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"No obvious conflicts found" means the model has no memory of a conflict — which is not a clearance search.</text>
  <text x="32" y="436" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">AI owns the generation · humans own the decision · counsel owns the clearance.</text>
</svg>
