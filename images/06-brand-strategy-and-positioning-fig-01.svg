<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-06-01">
  <title id="fig-title-06-01">Brand strategy versus marketing strategy</title>
  <desc>Two panels: brand strategy answers who we are, for whom, what we never compromise; marketing strategy answers how we reach our audience. Marketing is downstream of brand.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="06-brand-strategy-and-positioning"
      figure-number="01" figure-title="Brand strategy versus marketing strategy" figure-slug="brand-vs-marketing-strategy"
      figure-type="comparison panels" priority="Important" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/06-brand-strategy-and-positioning-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="340" fill="#FFFFFF"/>
  <defs><marker id="arrow0601" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker></defs>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The distinction most founders skip</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Brand is who you are. Marketing is how you reach people. Brand comes first.</text>

  <!-- Brand panel -->
  <rect x="32" y="86" width="290" height="180" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <rect x="32" y="86" width="290" height="38" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="44" y="111" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Brand strategy</text>
  <text x="44" y="150" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">"Who are we, for whom, and</text>
  <text x="44" y="166" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">what will we never compromise?"</text>
  <text x="44" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The constraint set: mission, values,</text>
  <text x="44" y="216" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">archetype, positioning, refusals.</text>
  <text x="44" y="244" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Makes the marketing coherent.</text>

  <!-- Marketing panel -->
  <rect x="378" y="86" width="290" height="180" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="378" y="86" width="290" height="38" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="390" y="111" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Marketing strategy</text>
  <text x="390" y="150" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">"How do we reach our audience?"</text>
  <text x="390" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Channels, messages, conversion</text>
  <text x="390" y="216" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">funnels, ad spend.</text>
  <text x="390" y="244" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Downstream of the brand.</text>

