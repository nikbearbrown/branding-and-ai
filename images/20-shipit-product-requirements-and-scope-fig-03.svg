<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-20-03">
  <title id="fig-title-20-03">The Build-Measure-Learn loop</title>
  <desc>Ries's three-node closed cycle — Build, Measure, Learn — each annotated with its PRD connection. Learn is the purpose of the MVP: validated learning.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="20-shipit-product-requirements-and-scope"
      figure-number="03" figure-title="The Build-Measure-Learn loop"
      figure-slug="build-measure-learn-loop" figure-type="cycle diagram"
      priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/20-shipit-product-requirements-and-scope-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The Build–Measure–Learn loop, and what each node owes the PRD</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The loop only works if you know — before you build — which assumption you are testing.</text>

  <defs>
    <marker id="arrow2003" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
    <marker id="arrow2003r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>

  <!-- Center hypothesis -->
  <text x="350" y="232" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="13" fill="#545454">Hypothesis</text>
  <text x="350" y="250" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the assumption under test</text>

  <!-- BUILD node (top) -->
  <rect x="278" y="92" width="144" height="64" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="350" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">BUILD</text>
  <text x="350" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">smallest tool = MVP boundary</text>

  <!-- MEASURE node (bottom right) -->
  <rect x="468" y="296" width="160" height="64" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="548" y="322" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">MEASURE</text>
  <text x="548" y="342" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">what users did, not said</text>

  <!-- LEARN node (bottom left) — RED, the focal point -->
  <rect x="72" y="296" width="160" height="64" fill="#F5F5F5" stroke="#C8102E" stroke-width="2"/>
  <text x="152" y="322" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#C8102E">LEARN</text>
  <text x="152" y="342" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">update the hypothesis</text>

  <!-- Arrows around the loop -->
  <!-- Build -> Measure -->
  <path d="M 422 150 Q 540 200 540 290" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow2003)"/>
  <!-- Measure -> Learn -->
  <line x1="466" y1="334" x2="238" y2="334" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow2003)"/>
  <!-- Learn -> Build (red, closing the loop into the next build) -->
  <path d="M 160 294 Q 160 200 274 152" stroke="#C8102E" stroke-width="1.5" fill="none" marker-end="url(#arrow2003r)"/>

  <!-- Outer arc label -->
  <rect x="32" y="386" width="636" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="405" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">The PRD is a living document — every Learn rewrites the hypothesis it began with.</text>

  <text x="32" y="432" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: RIES, THE LEAN STARTUP (2011) · CH. 20</text>
</svg>
