<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01-05">
  <title id="fig-title-01-05">Four-verb scoring rubric</title>
  <desc>A grid scoring Ideate, Build, Brand, and Ship at three levels: 1 no evidence, 3 some evidence, 5 a clear public artifact.</desc>
  <rect x="0" y="0" width="760" height="420" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Score yourself honestly — evidence, not aspiration</text>

  <!-- column header band with greyscale ramp -->
  <rect x="160" y="60" width="190" height="36" fill="#F0EBE3" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="350" y="60" width="190" height="36" fill="#ADADAD" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="540" y="60" width="190" height="36" fill="#545454" stroke="#D4D4D4" stroke-width="1"/>
  <text x="255" y="83" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Score 1 — no evidence</text>
  <text x="445" y="83" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Score 3 — some evidence</text>
  <text x="635" y="83" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Score 5 — public artifact</text>

  <!-- row labels + cells -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">
    <!-- Ideate -->
    <rect x="30" y="96" width="130" height="78" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="42" y="138" font-size="13" font-weight="700">Ideate</text>
    <rect x="160" y="96" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="170" y="120" fill="#545454">Topic picked by tech,</text><text x="170" y="136" fill="#545454">not user need</text>
    <rect x="350" y="96" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="360" y="120" fill="#545454">README frames why,</text><text x="360" y="136" fill="#545454">no external validation</text>
    <rect x="540" y="96" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="550" y="120" fill="#545454">User research / problem</text><text x="550" y="136" fill="#545454">discovery before building</text>

    <!-- Build -->
    <rect x="30" y="174" width="130" height="78" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="42" y="216" font-size="13" font-weight="700">Build</text>
    <rect x="160" y="174" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="170" y="198" fill="#545454">No complete,</text><text x="170" y="214" fill="#545454">functional projects</text>
    <rect x="350" y="174" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="360" y="198" fill="#545454">One deployed project;</text><text x="360" y="214" fill="#545454">partial portfolio</text>
    <rect x="540" y="174" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="550" y="198" fill="#545454">Multiple complete projects,</text><text x="550" y="214" fill="#545454">production-grade, readable</text>

    <!-- Brand -->
    <rect x="30" y="252" width="130" height="78" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="42" y="294" font-size="13" font-weight="700">Brand</text>
    <rect x="160" y="252" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="170" y="276" fill="#545454">Generic bio; no</text><text x="170" y="292" fill="#545454">recognizable voice</text>
    <rect x="350" y="252" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="360" y="276" fill="#545454">Some consistency; bio</text><text x="360" y="292" fill="#545454">names a specialization</text>
    <rect x="540" y="252" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="550" y="276" fill="#545454">Coherent identity; a stranger</text><text x="550" y="292" fill="#545454">can describe your position</text>

    <!-- Ship -->
    <rect x="30" y="330" width="130" height="78" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
    <text x="42" y="372" font-size="13" font-weight="700">Ship</text>
    <rect x="160" y="330" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="170" y="354" fill="#545454">No public deployment;</text><text x="170" y="370" fill="#545454">repos only</text>
    <rect x="350" y="330" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="360" y="354" fill="#545454">Live at a URL; limited</text><text x="360" y="370" fill="#545454">evidence of real users</text>
    <rect x="540" y="330" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="550" y="354" fill="#545454">Real users; documented</text><text x="550" y="370" fill="#545454">iteration; public metrics</text>
  </g>
