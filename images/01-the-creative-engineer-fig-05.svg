<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">The four verbs of the Creative Engineer</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Each verb is a separating signal. Build cheapens; the others have to do more of the separation work.</text>
<rect x="-16" y="128" width="144" height="144" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="56" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">IDEATE</text>
<text x="56" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Scope a problem worth solving</text>
<text x="56" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">What gets built — and why</text>
<rect x="148" y="128" width="144" height="144" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
<text x="220" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">BUILD</text>
<text x="220" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Produce a working artifact</text>
<text x="220" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">The cheapened verb</text>
<rect x="312" y="128" width="144" height="144" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="384" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">BRAND</text>
<text x="384" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Position for a specific audience</text>
<text x="384" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Who the work is for</text>
<rect x="476" y="128" width="144" height="144" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="548" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">SHIP</text>
<text x="548" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Get it in front of users</text>
<text x="548" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Real-world feedback loop</text>
<path d="M128 200 L148 200" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M292 200 L312 200" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M456 200 L476 200" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="350.0" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">The portfolio that demonstrates all four is hard to assemble — and reads as the new costly signal.</text>
<text x="350.0" y="354" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Build alone separates only when build itself is hard. When tooling cheapens the build, separation moves upstream and downstream.</text>
</svg>