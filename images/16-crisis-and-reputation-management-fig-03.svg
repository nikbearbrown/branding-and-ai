<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-16-03">
  <title id="fig-title-16-03">The Tylenol standard: action first, then words</title>
  <desc>Johnson and Johnson's 1982 response as a left-to-right sequence: scope the problem, pull 31 million bottles nationwide at a cost of 100 million dollars, communicate openly, invent tamper-evident packaging, relaunch, and recover market share. The pivotal move is the irreversible costly action that preceded the messaging.</desc>
