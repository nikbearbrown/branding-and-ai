<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-3-10 desc-3-10">
<title id="title-3-10">The archetype is load-bearing across the whole book, not just Chapter 3</title>
<desc id="desc-3-10">A horizontal timeline of the book's chapters with the archetype shown as a red band: provisionally picked in Chapter 2, committed in Chapter 3, running as a silent constraint through Chapters 4 to 7, and fully reactivated in Chapter 8. The student should see the archetype is active throughout, not a one-chapter exercise.</desc>
<rect width="700" height="360" fill="#FFFFFF"/>
<text x="48" y="48" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#2a1a0e">The archetype is load-bearing across the whole book</text>
<text x="48" y="70" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">Picked in Ch. 2, committed in Ch. 3, a silent constraint through Ch. 4&#8211;7, reactivated in Ch. 8.</text>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<!-- chapter axis ticks -->
<line x1="56" y1="250" x2="652" y2="250" stroke="#D4D4D4" stroke-width="1"/>
<g font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" text-anchor="middle">
<text x="86" y="270">1</text>
<text x="160" y="270">2</text>
<text x="234" y="270">3</text>
<text x="308" y="270">4</text>
<text x="382" y="270">5</text>
<text x="456" y="270">6</text>
<text x="530" y="270">7</text>
<text x="604" y="270">8</text>
</g>
<text x="354" y="296" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">Chapter</text>

<!-- dormant inactive segment Ch1 (thin gray dashed before pick) -->
<line x1="86" y1="170" x2="160" y2="170" stroke="#545454" stroke-width="1.5" stroke-dasharray="3 4"/>
<!-- active band Ch2-3 (solid red, thick) -->
<rect x="160" y="156" width="74" height="28" fill="#C8102E"/>
<text x="197" y="174" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#FFFFFF">active</text>
<rect x="234" y="156" width="0" height="28" fill="#C8102E"/>
<rect x="160" y="156" width="148" height="28" fill="#C8102E"/>
<text x="234" y="174" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#FFFFFF">archetype active</text>
<!-- dormant Ch4-7 thin dashed red -->
<line x1="308" y1="170" x2="530" y2="170" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="2 5"/>
<text x="419" y="200" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454">dormant: silent constraint</text>
<!-- reactivated Ch8 solid red band -->
<rect x="530" y="156" width="74" height="28" fill="#C8102E"/>
<text x="567" y="174" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#FFFFFF">full activation</text>

<!-- inflection labels with arrows -->
<text x="160" y="124" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#2a1a0e">Provisional pick</text>
<path d="M 160 130 L 160 152" stroke="#2a1a0e" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text x="234" y="124" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#C8102E" font-weight="bold">Commit (Ch. 3)</text>
<path d="M 234 130 L 234 152" stroke="#C8102E" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text x="567" y="124" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#2a1a0e">Brand activation</text>
<path d="M 567 130 L 567 152" stroke="#2a1a0e" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<line x1="48" y1="328" x2="652" y2="328" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="346" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 3.10</text>
</svg>
