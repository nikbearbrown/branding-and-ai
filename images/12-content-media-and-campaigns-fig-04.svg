  <rect x="32" y="232" width="190" height="92" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="48" y="258" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">4 Channel mix</text>
