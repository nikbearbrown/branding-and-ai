<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-12-04">
  <title id="fig-title-12-04">The campaign brief: six questions in sequence</title>
  <desc>The campaign brief answers six questions in order, each constraining the next: objective, audience, message, channel mix, budget, measurement. Without a measurable objective you have a publishing impulse, not a campaign.</desc>
