  <!-- Row 1: Objective, Audience, Message -->
  <!-- Objective RED -->
  <rect x="32" y="80" width="190" height="92" fill="#121212" stroke="#121212" stroke-width="1"/>
  <text x="48" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">1 Objective</text>
  <text x="48" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">specific, measurable</text>
  <text x="48" y="144" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">change — verifiable</text>
  <text x="48" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">after the campaign</text>

  <rect x="255" y="80" width="190" height="92" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="271" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">2 Audience</text>
  <text x="271" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">the named, specific</text>
  <text x="271" y="144" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">person — can be more</text>
  <text x="271" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">specific than the brand's</text>

  <rect x="478" y="80" width="190" height="92" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="494" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">3 Message</text>
  <text x="494" y="128" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">one testable claim —</text>
  <text x="494" y="144" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">more than one means</text>
  <text x="494" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">more than one campaign</text>

