  <text x="48" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">why each, how they</text>
  <text x="48" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">connect</text>

  <rect x="255" y="232" width="190" height="92" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="271" y="258" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">5 Budget</text>
  <text x="271" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">work backward from</text>
  <text x="271" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">spend to achievable</text>
  <text x="271" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">objective</text>

  <rect x="478" y="232" width="190" height="92" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="494" y="258" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">6 Measurement</text>
  <text x="494" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">one primary KPI,</text>
  <text x="494" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">set before launch,</text>
  <text x="494" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">not after</text>

