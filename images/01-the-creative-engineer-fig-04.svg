<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01-04">
  <title id="fig-title-01-04">The four verbs of the Creative Engineer</title>
  <desc>Ideate, Build, Brand, Ship in sequence; Build is greyed as the verb AI cheapened, with definitions on each box.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
  </defs>
  <rect x="0" y="0" width="720" height="320" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The four verbs — Build is the one AI cheapened</text>

  <rect x="40" y="110" width="140" height="90" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="110" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Ideate</text>
  <text x="110" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">decide what is</text>
  <text x="110" y="178" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">worth building</text>

  <rect x="220" y="110" width="140" height="90" fill="#F5F5F5" stroke="#ADADAD" stroke-width="1"/>
  <text x="290" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#787878" text-anchor="middle">Build</text>
  <text x="290" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#ADADAD" text-anchor="middle">necessary, no longer</text>
  <text x="290" y="178" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#ADADAD" text-anchor="middle">a separating signal</text>
  <text x="290" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-style="italic" fill="#545454" text-anchor="middle">cheapened by AI tooling</text>

  <rect x="400" y="110" width="140" height="90" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="470" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Brand</text>
  <text x="470" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">audience, position,</text>
  <text x="470" y="178" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">voice — legibility</text>

  <rect x="580" y="110" width="140" height="90" fill="#FFFFFF" stroke="#121212" stroke-width="1.25"/>
  <text x="650" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Ship</text>
  <text x="650" y="162" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">public URL, real</text>
  <text x="650" y="178" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">users, feedback</text>

