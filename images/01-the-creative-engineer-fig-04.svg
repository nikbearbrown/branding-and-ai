  <line x1="362" y1="155" x2="396" y2="155" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="542" y1="155" x2="576" y2="155" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text x="32" y="286" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The remaining costly signals sit on either side of Build — Ideate upstream, Brand and Ship downstream.</text>
