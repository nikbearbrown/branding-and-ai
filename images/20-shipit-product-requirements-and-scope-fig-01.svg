<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-20-01">
  <title id="fig-title-20-01">PRD section anatomy — the four questions</title>
  <desc>The one-page PRD decomposed into four sections — Problem, Gap, Tool, MVP Boundary — each with the question it answers and its characteristic failure mode.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="20-shipit-product-requirements-and-scope"
      figure-number="01" figure-title="PRD section anatomy — the four questions"
      figure-slug="prd-section-anatomy-four-questions" figure-type="structural schematic"
      priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/20-shipit-product-requirements-and-scope-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The one-page PRD — four sections, four questions</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Each section answers one question. Each has one characteristic way it fails.</text>

  <!-- Card 1: Problem -->
  <rect x="32" y="80" width="636" height="74" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="104" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">SECTION 1</text>
  <text x="48" y="124" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Problem</text>
  <text x="180" y="108" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">What specific problem, for whom, at what cost and how often?</text>
  <text x="180" y="134" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">FAILS WHEN: the user is abstracted ("marketing professionals") or a symptom is named, not a cause.</text>

  <!-- Card 2: Gap -->
  <rect x="32" y="166" width="636" height="74" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="190" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">SECTION 2</text>
  <text x="48" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Gap</text>
  <text x="180" y="194" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">What already exists, and exactly where does each option fall short?</text>
  <text x="180" y="220" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">FAILS WHEN: vagueness — "tools exist but they're not quite right" names no competitor and no failure.</text>

  <!-- Card 3: Tool -->
  <rect x="32" y="252" width="636" height="74" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="276" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">SECTION 3</text>
  <text x="48" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">Tool</text>
  <text x="180" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">What, exactly, will you build — at the level of input, output, cost?</text>
  <text x="180" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">FAILS WHEN: marketing language — "an AI-powered platform" tells the reader nothing buildable.</text>

  <!-- Card 4: MVP Boundary -->
  <rect x="32" y="338" width="636" height="74" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="362" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">SECTION 4</text>
  <text x="48" y="382" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#121212">MVP Boundary</text>
  <text x="180" y="366" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">What is in scope for v1 — and, explicitly, what is not?</text>
  <text x="180" y="392" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">FAILS WHEN: only the "in" column is written. The "out" list is what takes discipline.</text>

  <text x="32" y="430" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH. 20, WHAT A PRD ACTUALLY IS</text>
</svg>
