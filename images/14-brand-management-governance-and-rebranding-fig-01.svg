  <rect x="0" y="0" width="700" height="320" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">How a brand falls apart slowly</text>
  <text x="32" y="58" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">No single act is negligence. Each is the natural result of treating maintenance as an afterthought.</text>

  <defs>
    <marker id="arrow-14-01" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#121212"/>
    </marker>
  </defs>

  <!-- Three harmless-act boxes -->
  <rect x="32" y="100" width="170" height="96" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="48" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Off-system blue</text>
  <text x="48" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">grabbed for a slide</text>
  <text x="48" y="172" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">why: the right one was</text>
  <text x="48" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">buried in a folder</text>

  <rect x="248" y="100" width="170" height="96" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="264" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Too-formal email</text>
  <text x="264" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">from a new hire</text>
  <text x="264" y="172" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">why: nobody corrected</text>
  <text x="264" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">the first one</text>

  <rect x="464" y="100" width="170" height="96" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="480" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Last year's logo</text>
  <text x="480" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">used by a vendor</text>
  <text x="480" y="172" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">why: the new one was</text>
  <text x="480" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">never shared with them</text>

  <line x1="202" y1="148" x2="246" y2="148" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-14-01)"/>
  <line x1="418" y1="148" x2="462" y2="148" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-14-01)"/>

