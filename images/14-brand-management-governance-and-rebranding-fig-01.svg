<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-14-01">
  <title id="fig-title-14-01">How a brand falls apart slowly</title>
  <desc>No one decides to destroy a brand. Small uncorrected acts — an off-system blue, an unflagged too-formal email, a vendor using last year's logo — accumulate into incoherence; each is the natural result of treating maintenance as an afterthought.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
