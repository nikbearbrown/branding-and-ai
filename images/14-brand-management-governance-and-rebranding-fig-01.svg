  <line x1="350" y1="196" x2="350" y2="232" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-14-01)"/>
  <rect x="240" y="236" width="220" height="48" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="350" y="258" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Accumulated incoherence</text>
  <text x="350" y="276" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">no meeting ever decided to stop being consistent</text>
