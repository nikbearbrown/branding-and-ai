  <rect x="40" y="160" width="128" height="56" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="104" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Source</text>
  <text x="104" y="202" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">RSS / feed</text>

  <rect x="226" y="160" width="128" height="56" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="290" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">API call</text>
  <text x="290" y="202" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">3rd-party service</text>

  <rect x="412" y="160" width="128" height="56" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="476" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Transform</text>
  <text x="476" y="202" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">clean / score</text>

  <rect x="560" y="160" width="100" height="56" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="610" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">Store</text>
