  <rect x="306" y="248" width="160" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="386" y="268" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">CONTRACT 2</text>
  <text x="386" y="286" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">price · auth</text>
  <text x="386" y="301" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">schema fields</text>
