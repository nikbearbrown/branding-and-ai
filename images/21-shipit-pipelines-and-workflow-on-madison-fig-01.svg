<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-21-01">
  <title id="fig-title-21-01">A pipeline is a chain of contracts</title>
  <desc>A left-to-right chain of pipeline nodes where every connecting edge is labeled as a contract — shape, cost, rate limit, terms — each owned by someone else and subject to change.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="21-shipit-pipelines-and-workflow-on-madison"
      figure-number="01" figure-title="A pipeline is a chain of contracts"
