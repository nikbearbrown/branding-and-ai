  <rect x="120" y="248" width="160" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="200" y="268" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">CONTRACT 1</text>
  <text x="200" y="286" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">shape · rate limit</text>
  <text x="200" y="301" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">terms of service</text>
