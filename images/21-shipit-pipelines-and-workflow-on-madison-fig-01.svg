  <rect x="492" y="248" width="160" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="572" y="268" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">CONTRACT 3</text>
  <text x="572" y="286" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">quota · format</text>
  <text x="572" y="301" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">availability</text>
  <line x1="548" y1="216" x2="572" y2="246" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>

  <!-- Footer -->
  <rect x="32" y="350" width="636" height="46" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="350" y="370" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Every contract will change. Design for the day it does.</text>
  <text x="350" y="388" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The code is real and matters — but the contracts decide whether the pipeline survives in production.</text>

  <text x="32" y="424" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH. 21, A PIPELINE IS A CHAIN OF CONTRACTS</text>
