      priority="Critical" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/21-shipit-pipelines-and-workflow-on-madison-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">A pipeline is not code — it is a chain of contracts</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Between every component there is an agreement you do not own. The pipeline runs while every agreement holds.</text>

  <!-- Banner -->
  <rect x="32" y="80" width="636" height="28" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="99" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#121212">The pipeline breaks when one agreement fails — and the agreements are not yours to control.</text>

  <defs><marker id="arrow2101" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker></defs>

