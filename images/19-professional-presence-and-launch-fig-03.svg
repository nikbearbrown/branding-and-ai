  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The ten-slide pitch, slide by slide</text>
  <text x="32" y="56" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Kawasaki's 10 / 20 / 30 rule: ten slides, twenty minutes, thirty-point font. One idea, number, or visual per slide.</text>

