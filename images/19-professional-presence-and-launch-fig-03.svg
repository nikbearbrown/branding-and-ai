  <title id="fig-title-19-03">The ten-slide pitch, slide by slide</title>
  <desc>Kawasaki's 10/20/30 made specific: ten sequential slides from title and positioning through to the ask. Slide 6 (brand position) and slide 9 (you as the team) are the ones students skip and the ones that do the persuasion work.</desc>
  <metadata>
