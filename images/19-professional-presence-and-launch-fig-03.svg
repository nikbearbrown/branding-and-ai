  <text x="582" y="126" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">You as</text>
  <text x="582" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">the team</text>

  <circle cx="645" cy="100" r="5" fill="#121212"/>
  <text x="645" y="86" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">10</text>
  <text x="645" y="126" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">The ask</text>

  <!-- flagged-slide callout -->
  <rect x="32" y="200" width="636" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="44" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Slides 6 and 9 (open rings) are the ones students skip — and the ones that do the persuasion work.</text>
  <text x="44" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Slide 6: archetype, audience, voice, what the tool refuses to do — what distinguishes you from every other build.</text>
  <text x="44" y="256" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Slide 9: archetype, methodology, the four-verb framework, the portfolio URL — for a hiring audience, the key slide.</text>

  <!-- open/close note -->
  <text x="32" y="298" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">Open in scene, not in introduction.</text>
  <text x="32" y="318" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">"It is 7:45 on a Tuesday. A marketing manager opens her laptop…" earns attention that "Hi, I am [name]…" wastes.</text>
  <text x="32" y="338" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Close with the ask, delivered directly. After twenty minutes, the ask is the last impression — do not trail off.</text>

  <text x="32" y="384" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The 30-point rule forces editing: if content does not fit at 30pt, it is too dense for slides — move it to the script.</text>
  <text x="32" y="402" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Practice the full run-through at least twice; record the second and watch it.</text>
</svg>
