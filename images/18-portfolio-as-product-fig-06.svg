<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-18-06">
  <title id="fig-title-18-06">LinkedIn optimization, default vs. archetype-aligned</title>
  <desc>Five LinkedIn elements — headline, about, featured, experience, skills — shown as default state with its failure signal versus the archetype-aligned version. Two to three hours of work with compounding returns.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="18-portfolio-as-product" figure-number="06"
