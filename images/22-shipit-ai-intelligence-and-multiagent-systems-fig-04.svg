<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-22-04">
  <title id="fig-title-22-04">Archetype-to-architecture mapping</title>
  <desc>A mapping table for five brand archetypes — Sage, Creator, Explorer, Hero, Caregiver — each with a recommended architecture tendency, the archetype's shadow expressed as an AI failure mode, and what to watch for in production.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai" chapter="22-shipit-ai-intelligence-and-multiagent-systems"
      figure-number="04" figure-title="Archetype-to-architecture mapping" figure-slug="archetype-architecture-mapping"
      figure-type="comparison matrix" priority="Important" author="Nik Bear Brown &amp; Nina Harris"
      date-generated="2026-06-18" source-file="pantry/22-shipit-ai-intelligence-and-multiagent-systems-cajal.md"/>
