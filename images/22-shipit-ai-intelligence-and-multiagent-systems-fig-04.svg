  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Does your architecture express your archetype, or its shadow?</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The architectural choice and the archetype choice are not independent.</text>

  <!-- header -->
  <rect x="32" y="72" width="110" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="142" y="72" width="160" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="72" width="180" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="482" y="72" width="186" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="94" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Archetype</text>
  <text x="150" y="94" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Architecture tendency</text>
  <text x="310" y="94" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Shadow as AI failure mode</text>
  <text x="490" y="94" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Watch for in production</text>

  <!-- rows -->
  <!-- Sage -->
  <rect x="32" y="108" width="110" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="142" y="108" width="160" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="108" width="180" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="482" y="108" width="186" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Sage</text>
  <text x="150" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Architecture B, with</text>
  <text x="150" y="143" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">explicit "cannot verify"</text>
  <text x="150" y="156" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">guards</text>
  <text x="310" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Dogmatism — overconfident,</text>
  <text x="310" y="143" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">will not admit ignorance</text>
  <text x="490" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Wrong answers delivered</text>
  <text x="490" y="143" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">with high confidence</text>

  <!-- Creator -->
  <rect x="32" y="166" width="110" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="142" y="166" width="160" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="166" width="180" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="482" y="166" width="186" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="190" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Creator</text>
  <text x="150" y="190" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Architecture A if user is</text>
  <text x="150" y="203" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">a creative professional</text>
  <text x="310" y="190" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Perfectionism — invested in</text>
  <text x="310" y="203" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">process over the user</text>
  <text x="490" y="190" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Visible process more</text>
  <text x="490" y="203" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">interesting than output</text>

  <!-- Explorer -->
  <rect x="32" y="224" width="110" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="142" y="224" width="160" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="224" width="180" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="482" y="224" width="186" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Explorer</text>
  <text x="150" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Architecture A — but</text>
  <text x="150" y="261" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">high-risk; needs hard</text>
  <text x="150" y="274" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">ceilings</text>
  <text x="310" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Aimlessness — no</text>
  <text x="310" y="261" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">destination, no result</text>
  <text x="490" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Explores forever,</text>
  <text x="490" y="261" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">delivers nothing (AutoGPT)</text>

  <!-- Hero -->
  <rect x="32" y="282" width="110" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="142" y="282" width="160" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="282" width="180" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="482" y="282" width="186" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Hero</text>
  <text x="150" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Architecture B — reliable,</text>
  <text x="150" y="319" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">decisive delivery</text>
  <text x="310" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Overreach — promises more</text>
  <text x="310" y="319" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">than it can deliver reliably</text>
  <text x="490" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Bold claims that the</text>
  <text x="490" y="319" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">system cannot back up</text>

  <!-- Caregiver -->
  <rect x="32" y="340" width="110" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="142" y="340" width="160" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="302" y="340" width="180" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="482" y="340" width="186" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Caregiver</text>
  <text x="150" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Architecture B — safe,</text>
  <text x="150" y="377" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">predictable, human-gated</text>
  <text x="310" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Smothering — does too much</text>
  <text x="310" y="377" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">for the user, removes agency</text>
  <text x="490" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">Acts on the user's</text>
  <text x="490" y="377" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">behalf without consent</text>
</svg>
