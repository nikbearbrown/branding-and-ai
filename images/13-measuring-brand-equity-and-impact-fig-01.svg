      figure-type="timeline / two-series time chart" priority="Critical"
      author="Nik Bear Brown &amp; Nina Harris" date-generated="2026-06-18"
      source-file="pantry/13-measuring-brand-equity-and-impact-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The patience gap: two metric families move on different clocks</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Performance moves fast and volatile; brand equity moves slowly and durably.</text>

  <!-- plot region -->
  <rect x="64" y="80" width="556" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

