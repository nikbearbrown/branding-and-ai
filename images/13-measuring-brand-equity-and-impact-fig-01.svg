<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-13-01">
  <title id="fig-title-13-01">The patience gap: brand vs. performance metrics over time</title>
  <desc>Two metric families on a shared 0 to 24 month axis. A performance line moves fast and volatile; a brand line moves slowly and rises smoothly. The interval between when brand investment begins and when performance finally responds is labeled the patience gap.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
