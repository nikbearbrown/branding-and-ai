  <line x1="203" y1="80" x2="203" y2="360" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="342" y1="80" x2="342" y2="360" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="481" y1="80" x2="481" y2="360" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="620" y1="80" x2="620" y2="360" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- axes -->
  <line x1="64" y1="360" x2="620" y2="360" stroke="#121212" stroke-width="1"/>
  <line x1="64" y1="80"  x2="64"  y2="360" stroke="#121212" stroke-width="1"/>

  <!-- x tick labels -->
  <text x="64"  y="378" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">0</text>
  <text x="203" y="378" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">6</text>
  <text x="342" y="378" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">12</text>
  <text x="481" y="378" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">18</text>
  <text x="620" y="378" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">24</text>
  <text x="342" y="398" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">months</text>

  <!-- y axis label -->
  <text x="48" y="220" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 48 220)">metric index</text>

  <!-- brand investment begins marker (month 0) -->
  <line x1="64" y1="80" x2="64" y2="360" stroke="#121212" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="70" y="96" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">brand investment begins</text>

  <!-- performance metric: fast, volatile, flat-then-responding around month 12-14 -->
  <polyline fill="none" stroke="#787878" stroke-width="1.5"
