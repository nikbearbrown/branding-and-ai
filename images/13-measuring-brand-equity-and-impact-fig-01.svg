  <text x="214" y="356" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">the patience gap</text>
  <!-- performance-responds marker -->
  <line x1="364" y1="200" x2="364" y2="338" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="370" y="196" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">performance responds</text>

  <text x="32" y="424" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Watch only performance, and you cancel the brand campaign during the gap — before it produces the outcome it is building toward.</text>
