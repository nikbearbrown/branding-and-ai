  <text x="612" y="86" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">performance (fast, volatile)</text>

  <!-- brand metric: slow, smooth rise -->
  <path fill="none" stroke="#121212" stroke-width="1.5"
    d="M64,330 C 180,326 240,300 342,250 C 440,200 520,160 620,142"/>
  <text x="356" y="244" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#121212">brand equity (slow, smooth)</text>

