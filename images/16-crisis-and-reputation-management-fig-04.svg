<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-16-04">
  <title id="fig-title-16-04">The crisis playbook: four components</title>
  <desc>The playbook is written before the crisis, in four components: monitoring and alert thresholds, severity triage, holding statements, and an escalation path. Each lists what it contains, who owns it, and when it is used. The slow decisions are made in advance so the fast moment is execution.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="16-crisis-and-reputation-management" figure-number="04"
      figure-title="The crisis playbook: four components"
      figure-slug="crisis-playbook-four-components"
      figure-type="hierarchy / structural diagram" priority="Important"
      author="Nik Bear Brown &amp; Nina Harris" date-generated="2026-06-18"
      source-file="pantry/16-crisis-and-reputation-management-cajal.md"/>
  </metadata>
  <defs>
    <marker id="arrow-16-04" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#121212"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The crisis playbook is written before the fire</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Four components. Make the slow decisions in advance so the fast moment is execution, not judgment.</text>

  <!-- pre-crisis → live-moment axis on the left -->
  <line x1="56" y1="84" x2="56" y2="356" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow-16-04)"/>
  <text x="44" y="96" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" transform="rotate(-90 44 220)">pre-crisis preparation → live-moment execution</text>

  <!-- header columns -->
  <text x="392" y="76" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#545454">who owns it</text>
  <text x="560" y="76" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#545454">when used</text>

  <!-- Band 1: monitoring -->
  <rect x="80" y="84" width="588" height="62" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="92" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">1 · Monitoring &amp; alert thresholds</text>
  <text x="92" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">what you watch — brand name, products, key people, category keywords; what level</text>
  <text x="92" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">separates noise from a signal worth investigating</text>
  <text x="392" y="116" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">comms / founder</text>
  <text x="560" y="116" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">continuous</text>

  <!-- Band 2: triage -->
  <rect x="80" y="152" width="588" height="62" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="92" y="174" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">2 · Severity triage</text>
  <text x="92" y="194" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">first question — which SCCT type is this? Victim, accidental, or preventable?</text>
  <text x="92" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">the single most important judgment; every later decision follows from it</text>
  <text x="392" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">designated lead</text>
  <text x="560" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">on alert</text>

  <!-- Band 3: holding statements -->
  <rect x="80" y="220" width="588" height="62" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="92" y="242" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">3 · Holding statements</text>
  <text x="92" y="262" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">brief pre-drafted message per crisis category — acknowledges, commits to nothing</text>
  <text x="92" y="276" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">unsustainable; buys time for the real response. Content decided in advance</text>
  <text x="392" y="252" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">comms (pre-drafted)</text>
  <text x="560" y="252" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">first hour</text>

  <!-- Band 4: escalation -->
  <rect x="80" y="288" width="588" height="62" fill="#F5F5F5" stroke="#121212" stroke-width="1"/>
  <text x="92" y="310" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212">4 · Escalation path</text>
  <text x="92" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">who decides, who speaks, who approves; primary + backup; is legal review required</text>
  <text x="92" y="344" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">before any public statement?</text>
  <text x="392" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">named in advance</text>
  <text x="560" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">before publishing</text>

  <text x="32" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">For a startup or personal brand the alert threshold sits lower — less buffer equity, a smaller audience, so a smaller</text>
  <text x="32" y="396" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">absolute signal is a larger proportional threat.</text>
</svg>
