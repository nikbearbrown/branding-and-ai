<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03-02">
  <title id="fig-title-03-02">Madison's five roles plus orchestration</title>
  <desc>Five specialized agent layers — Intelligence, Content, Research, Experience, Performance — coordinated by a central orchestration layer, with Performance closing the feedback loop.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#121212"/></marker>
  </defs>
  <rect x="0" y="0" width="720" height="480" fill="#FFFFFF"/>
  <text x="32" y="38" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">Five named roles around one orchestration layer</text>

  <!-- central orchestration -->
  <rect x="280" y="200" width="160" height="80" fill="#F5F5F5" stroke="#121212" stroke-width="1.25"/>
  <text x="360" y="234" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212" text-anchor="middle">Orchestration</text>
  <text x="360" y="254" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">coordinate, validate, allocate</text>

  <!-- five role boxes -->
  <!-- Intelligence top-left -->
  <rect x="60" y="80" width="200" height="64" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="160" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Intelligence</text>
  <text x="160" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">watch → scored signal</text>

  <!-- Content top-right -->
  <rect x="460" y="80" width="200" height="64" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="560" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Content</text>
  <text x="560" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">brief → publishable drafts</text>

  <!-- Research left -->
  <rect x="40" y="208" width="200" height="64" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="140" y="234" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Research</text>
  <text x="140" y="254" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">raw data → understanding</text>

  <!-- Experience bottom-left -->
  <rect x="60" y="336" width="200" height="64" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="160" y="362" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Experience</text>
  <text x="160" y="382" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">faces the customer</text>

  <!-- Performance bottom-right -->
  <rect x="460" y="336" width="200" height="64" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="560" y="362" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="700" fill="#121212" text-anchor="middle">Performance</text>
  <text x="560" y="382" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">measure → closes the loop</text>

  <!-- connectors -->
  <line x1="240" y1="120" x2="300" y2="204" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="420" y1="204" x2="480" y2="120" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="240" y1="240" x2="278" y2="240" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="240" y1="360" x2="300" y2="276" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="460" y1="360" x2="420" y2="276" stroke="#121212" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- feedback arrow from Performance back into orchestration -->
  <path d="M560 336 C 560 300, 470 300, 442 270" stroke="#121212" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="500" y="300" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">feedback</text>

  <text x="32" y="448" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Each layer is specialized, inspectable, and named — the same division a mature marketing org already uses.</text>
</svg>
