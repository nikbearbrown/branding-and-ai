<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-16-02">
  <title id="fig-title-16-02">SCCT: matching response to crisis type</title>
  <desc>Coombs's Situational Crisis Communication Theory in three rows ordered by rising responsibility attribution: victim (deny or bolster), accidental (diminish), and preventable (rebuild or mortification). Columns give an example, the public responsibility level, the appropriate strategy, and the strategy that backfires.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Branding and AI" book-slug="branding-and-ai"
      chapter="16-crisis-and-reputation-management" figure-number="02"
      figure-title="SCCT: matching response to crisis type"
      figure-slug="scct-crisis-types-strategies"
      figure-type="matrix / taxonomy" priority="Critical"
      author="Nik Bear Brown &amp; Nina Harris" date-generated="2026-06-18"
      source-file="pantry/16-crisis-and-reputation-management-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">SCCT: the strategy must match the responsibility</text>
  <text x="32" y="54" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The right response depends on how much responsibility the public assigns to the organization.</text>

  <!-- header -->
  <rect x="32" y="72" width="636" height="32" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Crisis type</text>
  <text x="150" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Example</text>
  <text x="312" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Responsibility</text>
  <text x="430" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Right strategy</text>
  <text x="560" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" fill="#121212">Backfires</text>

  <!-- separators -->
  <line x1="142" y1="72" x2="142" y2="372" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="304" y1="72" x2="304" y2="372" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="422" y1="72" x2="422" y2="372" stroke="#D4D4D4" stroke-width="0.75"/>
  <line x1="552" y1="72" x2="552" y2="372" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- victim row -->
  <rect x="32" y="104" width="636" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Victim</text>
  <text x="40"  y="142" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">external force</text>
  <text x="150" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">natural disaster,</text>
  <text x="150" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">product tampering</text>
  <text x="150" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">by an outside party</text>
  <text x="312" y="133" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">low</text>
  <!-- responsibility scale bar (low) -->
  <rect x="312" y="142" width="20" height="8" fill="#787878"/>
  <rect x="334" y="142" width="60" height="8" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="430" y="126" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">deny / bolster —</text>
  <text x="430" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">clarify non-fault,</text>
  <text x="430" y="154" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">reinforce the good</text>
  <text x="560" y="133" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">over-apology</text>
  <text x="560" y="147" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">implies guilt</text>

  <!-- accidental row -->
  <rect x="32" y="192" width="636" height="88" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Accidental</text>
  <text x="40"  y="230" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">unintended harm</text>
  <text x="150" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">technical failure,</text>
  <text x="150" y="228" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">good-faith error,</text>
  <text x="150" y="242" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">unexpected effect</text>
  <text x="312" y="221" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">moderate</text>
  <rect x="312" y="230" width="40" height="8" fill="#787878"/>
  <rect x="352" y="230" width="42" height="8" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="430" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">diminish —</text>
  <text x="430" y="228" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">acknowledge, give</text>
  <text x="430" y="242" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">credible context</text>
  <text x="560" y="221" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">denial reads</text>
  <text x="560" y="235" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">as evasion</text>

  <!-- preventable row -->
  <rect x="32" y="280" width="636" height="88" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="40"  y="302" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">Preventable</text>
  <text x="40"  y="318" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">knew or should have</text>
  <text x="150" y="302" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">misconduct,</text>
  <text x="150" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">negligence, deferred</text>
  <text x="150" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">safety violations</text>
  <text x="312" y="309" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">high</text>
  <rect x="312" y="318" width="82" height="8" fill="#121212"/>
  <text x="430" y="302" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">rebuild / mortify —</text>
  <text x="430" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">accept, apologize,</text>
  <text x="430" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#121212">correct for real</text>
  <text x="560" y="302" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">deny / diminish</text>
  <text x="560" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">compounds the</text>
  <text x="560" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">damage</text>

  <text x="32" y="394" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The recurring error: applying a low-responsibility strategy to a high-responsibility crisis. It signals the organization is</text>
  <text x="32" y="410" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">protecting itself rather than its stakeholders — often more damaging than the original crisis.</text>
</svg>
