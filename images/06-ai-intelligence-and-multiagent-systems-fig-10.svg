<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-6-10 desc-6-10">
<title id="title-6-10">Compounding error: even modest per-step error rates make long chains fail</title>
<desc id="desc-6-10">A line chart of the probability of an error-free agent output against the number of steps from 0 to 40. One line shows a 10 percent per-step error rate (0.9 to the n) and one shows a 5 percent rate (0.95 to the n). Annotated values: at 10 steps 35 percent versus 60 percent, at 20 steps 12 percent versus 36 percent, at 40 steps 1.5 percent versus 13 percent. Long autonomous chains are near-certain to fail.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="44" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#2a1a0e">Compounding error over agent steps</text>
<text x="48" y="64" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">Probability of an error-free result as step count rises. A 10% per-step error rate is near-certain failure by 40 steps.</text>

<!-- plot region -->
<rect x="80" y="96" width="540" height="260" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
<!-- gridlines y (0,25,50,75,100) -->
<g stroke="#D4D4D4" stroke-width="1" stroke-dasharray="2 4">
<line x1="80" y1="356" x2="620" y2="356"/>
<line x1="80" y1="291" x2="620" y2="291"/>
<line x1="80" y1="226" x2="620" y2="226"/>
<line x1="80" y1="161" x2="620" y2="161"/>
<line x1="80" y1="96" x2="620" y2="96"/>
</g>
<!-- y axis labels -->
<g font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" text-anchor="end">
<text x="72" y="360">0%</text>
<text x="72" y="295">25%</text>
<text x="72" y="230">50%</text>
<text x="72" y="165">75%</text>
<text x="72" y="100">100%</text>
</g>
<!-- x axis labels (0..40), plot 80->620 = 540px over 40 steps = 13.5px/step -->
<g font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" text-anchor="middle">
<text x="80" y="374">0</text>
<text x="215" y="374">10</text>
<text x="350" y="374">20</text>
<text x="485" y="374">30</text>
<text x="620" y="374">40</text>
</g>
<text x="350" y="396" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454">Number of agent steps</text>

<!-- 0.95^n line (secondary, ink) y = 356 - p*260 ; p at 0=1,10=.599,20=.358,30=.215,40=.129 -->
<polyline points="80,96 215,200 350,263 485,300 620,322" fill="none" stroke="#2a1a0e" stroke-width="2"/>
<!-- 0.9^n line (primary, red) p at 0=1,10=.349,20=.122,30=.042,40=.0148 -->
<polyline points="80,96 215,265 350,324 485,345 620,352" fill="none" stroke="#C8102E" stroke-width="2.5"/>

<!-- annotated points -->
<g font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9">
<circle cx="215" cy="265" r="3" fill="#C8102E"/><text x="222" y="262" fill="#C8102E">35%</text>
<circle cx="215" cy="200" r="3" fill="#2a1a0e"/><text x="222" y="190" fill="#2a1a0e">60%</text>
<circle cx="350" cy="324" r="3" fill="#C8102E"/><text x="357" y="324" fill="#C8102E">12%</text>
<circle cx="350" cy="263" r="3" fill="#2a1a0e"/><text x="357" y="258" fill="#2a1a0e">36%</text>
<circle cx="620" cy="352" r="3" fill="#C8102E"/><text x="586" y="345" fill="#C8102E">1.5%</text>
<circle cx="620" cy="322" r="3" fill="#2a1a0e"/><text x="588" y="315" fill="#2a1a0e">13%</text>
</g>

<!-- legend -->
<line x1="430" y1="116" x2="456" y2="116" stroke="#C8102E" stroke-width="2.5"/>
<text x="462" y="120" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#2a1a0e">10% per-step error</text>
<line x1="430" y1="134" x2="456" y2="134" stroke="#2a1a0e" stroke-width="2"/>
<text x="462" y="138" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#2a1a0e">5% per-step error</text>

<line x1="48" y1="392" x2="652" y2="392" stroke="#D4D4D4" stroke-width="1"/>
<text x="48" y="410" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 6.10</text>
</svg>
