  <text x="584" y="112" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#121212">The filter</text>

  <text x="32" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">When everyone can flood every channel, the scarce thing is no longer the content —</text>
  <text x="32" y="374" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">it is the reason to publish this and the judgment to make it good and true.</text>
