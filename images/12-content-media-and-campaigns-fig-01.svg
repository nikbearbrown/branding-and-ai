  <title id="fig-title-12-01">The flood and the filter</title>
  <desc>Cheap AI content floods every channel, raising the value of the scarce thing it cannot supply: editorial judgment — the decision of what is worth saying, verification that it is true, and the judgment that it sounds like you.</desc>
