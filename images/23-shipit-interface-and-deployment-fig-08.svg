  <rect x="0" y="0" width="700" height="440" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#121212">The README is not documentation — it is the last interface layer</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Six elements, in reading order. The user meets this before deciding whether to use the tool at all.</text>

  <!-- left rule marking one document -->
  <line x1="40" y1="84" x2="40" y2="406" stroke="#121212" stroke-width="2"/>

  <!-- E1 deployed URL -->
  <rect x="52" y="84" width="616" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="68" y="106" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">1 · Deployed URL</text>
  <text x="68" y="125" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">At the top, before anything else. FAILS WHEN: buried four paragraphs down.</text>

  <!-- E2 what it does -->
  <rect x="52" y="138" width="616" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="68" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">2 · What it does</text>
  <text x="68" y="179" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">One paragraph: input, output, who it's for. FAILS WHEN: it reads as marketing language.</text>

  <!-- E3 how to use -->
  <rect x="52" y="192" width="616" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="68" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">3 · How to use it</text>
  <text x="68" y="233" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Step by step, assume the user has never seen it. FAILS WHEN: it assumes prior knowledge.</text>

  <!-- E4 limits -->
  <rect x="52" y="246" width="616" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="68" y="268" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">4 · What its limits are</text>
  <text x="68" y="287" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The README-level alignment audit — explicit. FAILS WHEN: the limits section is missing.</text>

  <!-- E5 architecture diagram -->
  <rect x="52" y="300" width="616" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="68" y="322" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">5 · Architecture diagram</text>
  <text x="68" y="341" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Inputs, steps, outputs, external services. FAILS WHEN: absent — content matters over rendering.</text>

  <!-- E6 tech stack -->
  <rect x="52" y="354" width="616" height="52" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="68" y="376" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="700" fill="#121212">6 · Technology stack</text>
  <text x="68" y="395" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">Streamlit/Gradio · LLM API · n8n · storage. FAILS WHEN: the stack is undisclosed.</text>

