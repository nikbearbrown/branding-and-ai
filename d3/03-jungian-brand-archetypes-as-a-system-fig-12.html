<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The recognition asset is built by accumulation</title>
<style>
:root { --color-white:#FFFFFF; --color-fill:#F5F5F5; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; --color-gray-1:#787878; --color-gray-2:#ADADAD; }
@media (prefers-color-scheme: dark) { :root { --color-white:#111111; --color-fill:#1B1713; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; --color-gray-1:#8A8A8A; --color-gray-2:#5A5A5A; } }
* { box-sizing:border-box; } body { margin:0; background:var(--color-white); color:var(--color-ink); font-family:'EB Garamond', Georgia, serif; } #chart { min-height:100vh; padding:24px; }
.tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-ink); color:var(--color-white); border:1px solid var(--color-border); padding:8px 10px; font-family:'EB Garamond', Georgia, serif; font-size:13px; max-width:260px; }
.title { font-size:17px; font-weight:700; fill:var(--color-ink); } .subtitle { font-size:11px; fill:var(--color-secondary); }
.brand-head { font-size:12px; font-weight:700; fill:var(--color-ink); } .tp { font-size:9px; } .cap { font-size:10px; fill:var(--color-ink); } .note { font-size:10px; fill:var(--color-secondary); }
@media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const titleText="The recognition asset is built by accumulation";
const descText="Brand A's touchpoints are consistent and accumulate into a sharp customer model. Brand B's are mismatched and never resolve. One inconsistent touchpoint does not break recognition; twenty prevent it from forming.";
const touchpoints=["tweet","product page","packaging","error msg","PR statement","founder photo"];
const tooltip=d3.select('body').append('div').attr('class','tooltip');
function showTooltip(event,html){tooltip.html(html).style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px').transition().duration(150).style('opacity',1);}
function moveTooltip(event){tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px');}
function hideTooltip(){tooltip.transition().duration(100).style('opacity',0);}
function drawBrand(g,bw,consistent){
 const cols=3, cw=(bw-12)/cols, ch=34, vgap=8;
 const fills=consistent?['var(--color-red)','var(--color-red)','var(--color-red)','var(--color-red)','var(--color-red)','var(--color-red)']
   :['var(--color-secondary)','var(--color-gray-2)','var(--color-gray-1)','var(--color-gray-2)','var(--color-secondary)','var(--color-gray-1)'];
 const cells=g.selectAll('.tp-cell').data(touchpoints).join('g').attr('class','tp-cell')
   .attr('transform',(d,i)=>'translate('+((i%cols)*(cw+6))+','+(Math.floor(i/cols)*(ch+vgap))+')')
   .attr('tabindex',0).attr('aria-label',(d,i)=>d+' touchpoint, '+(consistent?'on-archetype':'mismatched'));
 cells.append('rect').attr('width',cw).attr('height',ch).attr('fill',(d,i)=>fills[i]).attr('opacity',0).transition().duration(320).delay((d,i)=>i*40).attr('opacity',1);
 cells.append('text').attr('class','tp').attr('x',cw/2).attr('y',ch/2+3).attr('text-anchor','middle')
   .attr('fill',(d,i)=>fills[i]==='var(--color-gray-2)'?'var(--color-ink)':'var(--color-white)').text(d=>d);
 cells.append('rect').attr('width',cw).attr('height',ch).attr('fill','transparent')
   .on('mouseover',(event,d)=>showTooltip(event,'<strong>'+d+'</strong><br>'+(consistent?'Consistent with the archetype':'Mismatched signal'))).on('mousemove',moveTooltip).on('mouseout',hideTooltip);
}
function draw(){
 d3.select('#chart').selectAll('*').remove();
 const container=document.getElementById('chart');
 const totalWidth=Math.max(container.clientWidth-48,640);
 const totalHeight=420;
 const svg=d3.select('#chart').append('svg').attr('width',totalWidth).attr('height',totalHeight).attr('role','img').attr('aria-labelledby','chart-title chart-desc');
 svg.append('title').attr('id','chart-title').text(titleText);
 svg.append('desc').attr('id','chart-desc').text(descText);
 svg.append('text').attr('class','title').attr('x',24).attr('y',32).text(titleText);
 svg.append('text').attr('class','subtitle').attr('x',24).attr('y',54).text("One inconsistent touchpoint does not break it. Twenty prevent the model from forming.");
 const colW=(totalWidth-48-40)/2, leftX=24, rightX=24+colW+40, topY=80;
 // Brand A
 svg.append('text').attr('class','brand-head').attr('x',leftX).attr('y',topY).text("Brand A — consistent archetype");
 const gA=svg.append('g').attr('transform','translate('+leftX+','+(topY+12)+')'); drawBrand(gA,colW,true);
 // Brand B
 svg.append('text').attr('class','brand-head').attr('x',rightX).attr('y',topY).text("Brand B — inconsistent archetype");
 const gB=svg.append('g').attr('transform','translate('+rightX+','+(topY+12)+')'); drawBrand(gB,colW,false);
 // models
 const modelY=topY+120;
 const mxA=leftX+colW/2, mxB=rightX+colW/2;
 [{x:mxA,clear:true,cap:"sharp, recognizable"},{x:mxB,clear:false,cap:"blurred, never placed"}].forEach(m=>{
  const box=svg.append('g').attr('transform','translate('+(m.x-55)+','+modelY+')');
  box.append('rect').attr('width',110).attr('height',120).attr('fill','var(--color-fill)').attr('stroke','var(--color-border)');
  if(m.clear){
   box.append('circle').attr('cx',55).attr('cy',40).attr('r',14).attr('fill','var(--color-red)');
   box.append('path').attr('d','M 34 100 q 21 -42 42 0 z').attr('fill','var(--color-red)');
  } else {
   box.append('circle').attr('cx',55).attr('cy',40).attr('r',14).attr('fill','var(--color-gray-1)').attr('opacity',0.5);
   box.append('path').attr('d','M 34 100 q 21 -42 42 0 z').attr('fill','var(--color-gray-2)').attr('opacity',0.5);
   box.append('line').attr('x1',16).attr('y1',60).attr('x2',98).attr('y2',102).attr('stroke','var(--color-gray-2)').attr('stroke-dasharray','2 3');
   box.append('line').attr('x1',98).attr('y1',52).attr('x2',18).attr('y2',108).attr('stroke','var(--color-gray-1)').attr('stroke-dasharray','2 3');
  }
  box.append('text').attr('class','cap').attr('x',55).attr('y',136).attr('text-anchor','middle').text(m.cap);
 });
}
draw();
const ro=new ResizeObserver(()=>draw()); ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
