<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Build-Measure-Learn loop</title>
<style>
:root { --color-white:#FFFFFF; --color-fill:#F5F5F5; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; }
@media (prefers-color-scheme: dark) { :root { --color-white:#111111; --color-fill:#1B1713; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; } }
* { box-sizing:border-box; } body { margin:0; background:var(--color-white); color:var(--color-ink); font-family:'EB Garamond', Georgia, serif; } #chart { min-height:100vh; padding:24px; }
.tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-ink); color:var(--color-white); border:1px solid var(--color-border); padding:8px 10px; font-family:'EB Garamond', Georgia, serif; font-size:13px; max-width:240px; }
.title { font-family:'EB Garamond', Georgia, serif; font-size:17px; font-weight:700; fill:var(--color-ink); } .subtitle,.node-sub { font-family:'EB Garamond', Georgia, serif; font-size:11px; fill:var(--color-secondary); }
@media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const nodes=[
 {label:"Build",sub:"smallest MVP that tests the hypothesis",angle:-90,accent:true,full:"Build the smallest real product that tests one hypothesis."},
 {label:"Measure",sub:"behavior, not stated intent",angle:30,accent:false,full:"Measure what users do — opens, shares, retention — not what they say."},
 {label:"Learn",sub:"revise hypothesis or build scope",angle:150,accent:false,full:"Learn whether the hypothesis held; update it or the build scope."}
];
const titleText='The Build-Measure-Learn loop';
const descText='A three-node circular loop (Build, Measure, Learn); each cycle tests one hypothesis and feeds an outer loop that updates the PRD.';
const tooltip=d3.select('body').append('div').attr('class','tooltip');
function showTooltip(event,html){tooltip.html(html).style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px').transition().duration(150).style('opacity',1);}
function moveTooltip(event){tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px');}
function hideTooltip(){tooltip.transition().duration(100).style('opacity',0);}
function draw(){
 d3.select('#chart').selectAll('*').remove();
 const container=document.getElementById('chart');
 const totalWidth=Math.max(container.clientWidth-48,700);
 const totalHeight=440;
 const svg=d3.select('#chart').append('svg').attr('width',totalWidth).attr('height',totalHeight)
   .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
 svg.append('title').attr('id','chart-title').text(titleText);
 svg.append('desc').attr('id','chart-desc').text(descText);
 svg.append('text').attr('class','title').attr('x',24).attr('y',32).text(titleText);
 svg.append('text').attr('class','subtitle').attr('x',24).attr('y',54).text('Each cycle tests one hypothesis and updates the PRD. The MVP boundary keeps the loop tight.');
 const defs=svg.append('defs');
 defs.append('marker').attr('id','arrow').attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto').append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ink)');
 defs.append('marker').attr('id','arrowO').attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto').append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ochre)');
 const cx=totalWidth*0.36, cy=250, r=120;
 const pos=nodes.map(n=>({...n,x:cx+r*Math.cos(n.angle*Math.PI/180),y:cy+r*Math.sin(n.angle*Math.PI/180)}));
 // arc connectors between consecutive nodes
 const arc=d3.path;
 for(let i=0;i<3;i++){
   const a=pos[i], b=pos[(i+1)%3];
   const path=d3.path();
   const a0=nodes[i].angle*Math.PI/180+0.42, a1=nodes[(i+1)%3].angle*Math.PI/180-0.42;
   path.arc(cx,cy,r,a0,a1);
   svg.append('path').attr('d',path.toString()).attr('fill','none').attr('stroke','var(--color-ink)').attr('stroke-width',1.5).attr('marker-end','url(#arrow)').attr('aria-hidden','true');
 }
 const g=svg.append('g').selectAll('.node').data(pos).join('g');
 g.each(function(d){
   const sel=d3.select(this);
   sel.append('rect').attr('x',d.x-52).attr('y',d.y-22).attr('width',104).attr('height',44).attr('rx',0)
     .attr('fill',d.accent?'var(--color-red)':'var(--color-white)').attr('stroke',d.accent?'var(--color-ink)':'var(--color-border)').attr('stroke-width',1).attr('tabindex',0)
     .attr('aria-label',d.label+': '+d.full)
     .on('mouseover',function(event){if(!d.accent)d3.select(this).attr('stroke','var(--color-red)'); showTooltip(event,'<strong>'+d.label+'</strong><br>'+d.full);})
     .on('mousemove',moveTooltip).on('mouseout',function(){if(!d.accent)d3.select(this).attr('stroke','var(--color-border)'); hideTooltip();});
   sel.append('text').attr('x',d.x).attr('y',d.y+4).attr('text-anchor','middle').attr('font-size',13).attr('fill',d.accent?'var(--color-white)':'var(--color-ink)').attr('font-family',"'EB Garamond', Georgia, serif").text(d.label);
   sel.append('text').attr('x',d.x).attr('y',d.y+40).attr('text-anchor','middle').attr('font-size',9).attr('fill','var(--color-secondary)').attr('font-family',"'EB Garamond', Georgia, serif").text(d.sub);
 });
 // outer loop to PRD box
 const px=totalWidth-220, py=224;
 svg.append('rect').attr('x',px).attr('y',py).attr('width',172).attr('height',56).attr('rx',0).attr('fill','var(--color-fill)').attr('stroke','var(--color-border)').attr('stroke-width',1).attr('tabindex',0)
   .attr('aria-label','PRD updated: a living document revised each cycle')
   .on('mouseover',(event)=>showTooltip(event,'<strong>PRD updated</strong><br>Each cycle feeds the PRD — it is a living document, not a one-time artifact.'))
   .on('mousemove',moveTooltip).on('mouseout',hideTooltip);
 svg.append('text').attr('x',px+86).attr('y',py+24).attr('text-anchor','middle').attr('font-size',12).attr('font-weight',700).attr('fill','var(--color-ink)').attr('font-family',"'EB Garamond', Georgia, serif").text('PRD updated');
 svg.append('text').attr('x',px+86).attr('y',py+42).attr('text-anchor','middle').attr('font-size',9).attr('fill','var(--color-secondary)').attr('font-family',"'EB Garamond', Georgia, serif").text('a living document');
 const op=d3.path(); op.moveTo(cx+r*0.2,cy+r+10); op.bezierCurveTo(cx+200,cy+150,px-30,py+90,px-4,py+40);
 svg.append('path').attr('d',op.toString()).attr('fill','none').attr('stroke','var(--color-ochre)').attr('stroke-width',1.5).attr('stroke-dasharray','4 3').attr('marker-end','url(#arrowO)').attr('aria-hidden','true');
}
draw();
const ro=new ResizeObserver(()=>draw()); ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
