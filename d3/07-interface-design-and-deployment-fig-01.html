<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three misalignment types mapped to three case studies</title>
<style>
:root { --color-white:#FFFFFF; --color-fill:#F5F5F5; --color-ink:#2a1a0e; --color-red:#C8102E; --color-secondary:#545454; --color-border:#D4D4D4; --color-ochre:#C8860E; }
@media (prefers-color-scheme: dark) { :root { --color-white:#111111; --color-fill:#1B1713; --color-ink:#F0EBE3; --color-red:#E8243A; --color-secondary:#A0978C; --color-border:#2E2E2E; --color-ochre:#D49A30; } }
* { box-sizing:border-box; } body { margin:0; background:var(--color-white); color:var(--color-ink); font-family:'EB Garamond', Georgia, serif; } #chart { min-height:100vh; padding:24px; }
.tooltip { position:absolute; pointer-events:none; opacity:0; background:var(--color-ink); color:var(--color-white); border:1px solid var(--color-border); padding:8px 10px; font-family:'EB Garamond', Georgia, serif; font-size:13px; max-width:260px; }
.title { font-family:'EB Garamond', Georgia, serif; font-size:17px; font-weight:700; fill:var(--color-ink); } .subtitle,.col-head { font-family:'EB Garamond', Georgia, serif; font-size:11px; fill:var(--color-secondary); }
@media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const rows=[
 {case:"Bard",type:"confidence",promise:"authoritative, Google-quality answers",reality:"research preview; the JWST claim was wrong",consequence:"~$100B market cap lost in a day"},
 {case:"Snapchat",type:"tone",promise:"casual, private friend messaging",reality:"redesign signals \"content platform\"",consequence:"1.2M-signature revert petition"},
 {case:"Tay",type:"capability",promise:"safely learns from public input",reality:"no defense against adversarial input",consequence:"pulled offline in ~16 hours"}
];
const cols=["Interface promise","System reality","Brand consequence"];
const titleText='Three misalignment types, three case studies';
const descText='Rows are Bard, Snapchat, and Tay; columns are interface promise, system reality, and brand consequence. The gap between promise and reality is the misalignment.';
const tooltip=d3.select('body').append('div').attr('class','tooltip');
function showTooltip(event,html){tooltip.html(html).style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px').transition().duration(150).style('opacity',1);}
function moveTooltip(event){tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px');}
function hideTooltip(){tooltip.transition().duration(100).style('opacity',0);}
function wrap(text,sel){ /* simple two-line wrap helper inline below */ }
function draw(){
 d3.select('#chart').selectAll('*').remove();
 const container=document.getElementById('chart');
 const totalWidth=Math.max(container.clientWidth-48,700);
 const totalHeight=420;
 const svg=d3.select('#chart').append('svg').attr('width',totalWidth).attr('height',totalHeight)
   .attr('role','img').attr('aria-labelledby','chart-title chart-desc');
 svg.append('title').attr('id','chart-title').text(titleText);
 svg.append('desc').attr('id','chart-desc').text(descText);
 svg.append('text').attr('class','title').attr('x',24).attr('y',32).text(titleText);
 svg.append('text').attr('class','subtitle').attr('x',24).attr('y',54).text('The interface promises; the system cannot keep it; the brand pays the gap.');
 const defs=svg.append('defs');
 defs.append('marker').attr('id','arrow').attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto').append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ink)');
 const labelW=80, gap=18, top=92;
 const cellW=(totalWidth-24-labelW-2*gap-48)/3, cellH=58, rowGap=22;
 const colX=i=>24+labelW+i*(cellW+gap);
 cols.forEach((c,i)=>{ svg.append('text').attr('x',colX(i)+cellW/2).attr('y',top-8).attr('text-anchor','middle').attr('class','col-head').attr('font-weight',700).text(c); });
 rows.forEach((r,ri)=>{
   const y=top+ri*(cellH+rowGap);
   svg.append('text').attr('x',24).attr('y',y+26).attr('font-size',11).attr('font-weight',700).attr('fill','var(--color-ink)').attr('font-family',"'EB Garamond', Georgia, serif").text(r.case);
   svg.append('text').attr('x',24).attr('y',y+42).attr('font-size',8).attr('fill','var(--color-red)').attr('font-family',"'EB Garamond', Georgia, serif").text(r.type);
   const cells=[{t:r.promise,fill:'var(--color-white)',stroke:'var(--color-border)',tc:'var(--color-ink)'},
                {t:r.reality,fill:'var(--color-fill)',stroke:'var(--color-border)',tc:'var(--color-ink)'},
                {t:r.consequence,fill:ri===0?'var(--color-red)':'var(--color-white)',stroke:ri===0?'var(--color-ink)':'var(--color-ink)',tc:ri===0?'var(--color-white)':'var(--color-ink)'}];
   cells.forEach((cell,ci)=>{
     const x=colX(ci);
     svg.append('rect').attr('x',x).attr('y',y).attr('width',cellW).attr('height',cellH).attr('rx',0)
       .attr('fill',cell.fill).attr('stroke',cell.stroke).attr('stroke-width',ci===2?1.5:1).attr('tabindex',0)
       .attr('aria-label',r.case+' '+cols[ci]+': '+cell.t)
       .on('mouseover',function(event){if(!(ri===0&&ci===2))d3.select(this).attr('stroke','var(--color-red)'); showTooltip(event,'<strong>'+r.case+' — '+r.type+'</strong><br>'+cols[ci]+': '+cell.t);})
       .on('mousemove',moveTooltip).on('mouseout',function(){d3.select(this).attr('stroke',cell.stroke); hideTooltip();});
     const words=cell.t.split(' '); let lines=[],cur='';
     words.forEach(w=>{ if((cur+' '+w).length>26){lines.push(cur);cur=w;} else {cur=cur?cur+' '+w:w;} }); if(cur)lines.push(cur);
     lines=lines.slice(0,3);
     lines.forEach((ln,li)=>{ svg.append('text').attr('x',x+cellW/2).attr('y',y+cellH/2-(lines.length-1)*6+li*12+4).attr('text-anchor','middle').attr('font-size',9).attr('fill',cell.tc).attr('font-family',"'EB Garamond', Georgia, serif").text(ln); });
     if(ci<2){ svg.append('line').attr('x1',x+cellW).attr('y1',y+cellH/2).attr('x2',x+cellW+gap-4).attr('y2',y+cellH/2).attr('stroke','var(--color-ink)').attr('stroke-width',1.5).attr('marker-end','url(#arrow)').attr('aria-hidden','true'); }
   });
 });
}
draw();
const ro=new ResizeObserver(()=>draw()); ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
